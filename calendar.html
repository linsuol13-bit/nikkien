<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=0.5,maximum-scale=5,user-scalable=yes">
<title>이벤트 달력</title>
<style>
  ::-webkit-scrollbar{width:7px;height:7px}
  ::-webkit-scrollbar-track{background:var(--pk-5,#fff5f8);border-radius:999px}
  ::-webkit-scrollbar-thumb{background:var(--pk-3,#f48fb1);border-radius:999px}
  ::-webkit-scrollbar-thumb:hover{background:var(--pk-2,#f06292)}
  *{scrollbar-width:thin;scrollbar-color:var(--pk-3,#f48fb1) var(--pk-5,#fff5f8)}
:root{--p1:#e91e8c;--p2:#f06292;--pb:#f8bbd0;--p5:#fff5f8;--p4:#fce4ec;--pm:#a06080}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--p5);color:#2d1a22}
.bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:9px 12px;background:#fff;border-bottom:1.5px solid var(--pb);position:sticky;top:0;z-index:10}
.bar h2{font-size:14px;font-weight:800;color:var(--p1)}
.mnav{display:flex;align-items:center;gap:4px}
.mnav button{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--pb);background:#fff;cursor:pointer;font-size:14px;color:var(--p1);display:flex;align-items:center;justify-content:center}
.mnav button:hover{background:var(--p4)}
.mlbl{font-size:13px;font-weight:700;min-width:90px;text-align:center}
.tbtn{padding:4px 9px;border-radius:8px;font-size:11px;font-weight:700;border:1.5px solid var(--pb);background:#fff;cursor:pointer;color:var(--p1)}
.tbtn:hover{background:var(--p4)}
select{padding:5px 22px 5px 7px;border:1.5px solid var(--pb);border-radius:9px;background:#fff;color:#2d1a22;font-size:12px;font-family:inherit;appearance:none;-webkit-appearance:none;cursor:pointer}
select:focus{outline:none;border-color:var(--p2)}
.vtog{display:flex;gap:3px}
.vtog button{padding:5px 9px;border-radius:8px;border:1.5px solid var(--pb);background:#fff;cursor:pointer;font-size:11px;font-weight:600;color:#2d1a22}
.vtog button.on{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border-color:transparent}
.addbtn{padding:6px 12px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;font-weight:700;font-size:12px;cursor:pointer;margin-left:auto}
.addbtn:hover{opacity:.85}
.wrap{padding:10px 12px}
.chdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.chdr div{text-align:center;font-size:11px;font-weight:700;padding:3px 0;color:var(--pm)}
.chdr div:first-child{color:#e53935}
.chdr div:last-child{color:#1976d2}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cell{min-height:120px;background:#fff;border:1px solid var(--pb);border-radius:8px;padding:4px 3px;overflow:hidden}
.cell.om{background:#fafafa;opacity:.45}
.cell.td{border-color:var(--p1);border-width:2px}
.dn{font-size:11px;font-weight:700;color:var(--pm);display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;margin-bottom:2px}
.cell.td .dn{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff}
.cgrid>.cell:nth-child(7n+1) .dn{color:#e53935}
.cgrid>.cell:nth-child(7n) .dn{color:#1976d2}
.evrow{height:20px;margin-bottom:2px;display:flex;align-items:center;gap:0}
.evbtn{height:18px;border:none;cursor:pointer;display:flex;align-items:center;overflow:hidden;flex:1;transition:opacity .12s;padding:0}
.evbtn:hover{opacity:.8}
.evbtn.s{border-radius:0;clip-path:polygon(0 0, calc(100% - 7px) 0, 100% 50%, calc(100% - 7px) 100%, 0 100%)}
.evbtn.m{border-radius:0;clip-path:none}
.evbtn.e{border-radius:0 4px 4px 0;clip-path:none}
.evbtn.se{border-radius:4px;clip-path:polygon(0 0, calc(100% - 7px) 0, 100% 50%, calc(100% - 7px) 100%, 0 100%)}
.ev-thumb{width:34px;height:18px;border-radius:4px;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,.6)}
.ev-ph{width:34px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:rgba(255,255,255,.3)}
.ev-name{font-size:10px;font-weight:700;color:#fff;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;text-shadow:0 1px 2px rgba(0,0,0,.25)}
.ev-img-big{width:calc(100% + 6px);margin:-4px -3px 2px;height:180px;object-fit:cover;object-position:center;display:block;cursor:pointer;border-radius:6px 6px 0 0}
.ev-imgs-row{display:flex;gap:2px;width:calc(100% + 6px);margin:-4px -3px 2px;height:180px}
.ev-imgs-row img{flex:1;min-width:0;height:180px;object-fit:cover;object-position:center;cursor:pointer;border-radius:6px 6px 0 0}
.ev-imgs-row img:first-child{border-radius:6px 0 0 0}
.ev-imgs-row img:last-child{border-radius:0 6px 0 0}
.ev-imgs-row .ev-img-ph{flex:1;height:180px;display:flex;align-items:center;justify-content:center;font-size:32px;background:#fce4ec;border-radius:6px 6px 0 0;cursor:pointer}
.set-btn{padding:5px 12px;border-radius:999px;border:1.5px solid #f8bbd0;background:#fff5f8;color:#e91e8c;font-size:12px;font-weight:700;cursor:pointer;transition:background .13s}
.set-btn:hover{background:#fce4ec}
.ev-img-big:hover{opacity:.85}
.spacer{height:36px;margin-bottom:2px;visibility:hidden}
.ev-more{font-size:10px;color:var(--pm);padding:1px 3px}
.lv{display:none}
.lv.on{display:block}
.cv.off{display:none}
.litem{background:#fff;border:1.5px solid var(--pb);border-radius:12px;padding:9px 12px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:box-shadow .13s,border-color .13s}
.litem:hover{border-color:var(--p2);box-shadow:0 2px 12px rgba(233,30,140,.1)}
.lth{width:46px;height:46px;border-radius:9px;object-fit:cover;flex-shrink:0;border:1px solid var(--pb)}
.lph{width:46px;height:46px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px}
.badge{font-size:10px;padding:2px 7px;border-radius:999px;font-weight:600}
.sj{background:#fce4ec;color:#880e4f}
.sn{background:#e8f5e9;color:#1b5e20}
.sa{background:var(--p4);color:var(--p1)}
.bd{position:fixed;inset:0;background:rgba(45,26,34,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px}
.bd.h{display:none}
.modal{background:#fff;border-radius:18px;width:min(500px,100%);max-height:85vh;overflow-y:auto;border:1.5px solid var(--pb);box-shadow:0 20px 60px rgba(233,30,140,.2)}
.mhd{padding:11px 14px;border-bottom:1.5px solid var(--pb);background:linear-gradient(135deg,#fff5f8,#fce4ec);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0}
.mhd h3{font-size:15px;font-weight:800;color:var(--p1);line-height:1.3;max-width:calc(100% - 36px)}
.mcls{width:28px;height:28px;border-radius:9px;border:1.5px solid var(--pb);background:#fff;cursor:pointer;font-size:14px;color:var(--pm);display:flex;align-items:center;justify-content:center}
.mcls:hover{background:var(--p4);color:var(--p1)}
.mbody{padding:13px}
.mimg{width:100%;border-radius:11px;margin-bottom:11px;border:1px solid var(--pb);display:block;max-height:300px;object-fit:contain;background:#f8f8f8}
.mrow{display:flex;gap:6px;align-items:flex-start;margin-bottom:7px;font-size:13px}
.mlbl2{font-weight:700;color:var(--p1);min-width:52px;flex-shrink:0;font-size:11px;padding-top:1px}
.mnote{margin-top:9px;padding:9px 11px;border-radius:9px;background:var(--p5);border:1px solid var(--pb);font-size:12px;line-height:1.6;white-space:pre-wrap}
.macts{display:flex;gap:7px;margin-top:12px;justify-content:flex-end}
.bdel{padding:6px 12px;border-radius:9px;border:1.5px solid #fca5a5;background:#fff5f5;color:#dc2626;font-weight:600;font-size:12px;cursor:pointer}
.bdel:hover{background:#fee2e2}
.bedit{padding:6px 16px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;font-weight:700;font-size:12px;cursor:pointer}
.bedit:hover{opacity:.85}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--p1);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 9px;border:1.5px solid var(--pb);border-radius:9px;background:#fff;color:#2d1a22;font-size:13px;font-family:inherit;appearance:none;-webkit-appearance:none}
.fg textarea{min-height:68px;resize:vertical}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--p2);box-shadow:0 0 0 3px rgba(233,30,140,.1)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.facts{display:flex;gap:7px;justify-content:flex-end;margin-top:13px}
.bcan{padding:6px 13px;border-radius:9px;border:1.5px solid var(--pb);background:#fff;cursor:pointer;font-weight:600;font-size:12px}
.bcan:hover{background:var(--p4)}
.bsave{padding:6px 16px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;font-weight:700;font-size:12px;cursor:pointer}
.bsave:hover{opacity:.85}
.cchips{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.cc{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;display:inline-block}
.cc:hover,.cc.on{transform:scale(1.25);border-color:#333}
@media(max-width:600px){
  .cell{min-height:75px}
  .ev-name{display:none}
  .fr{grid-template-columns:1fr}
  /* 모바일: 이벤트 카드 1개씩 세로로 */
  .ev-card{flex:0 0 100% !important;min-width:0 !important}
}
</style>

<div class="bar">
  <h2>🌸 이벤트 달력</h2>
  <div class="mnav">
    <button id="bPrev">‹</button>
    <span class="mlbl" id="mlbl"></span>
    <button id="bNext">›</button>
    <button class="tbtn" id="bToday">오늘</button>
  </div>
  <select id="fSrv">
    <option value="">전체 서버</option>
    <option value="jp">🇯🇵 일본</option>
    <option value="na">🌎 북미</option>
    <option value="all">공통</option>
  </select>
  <div class="vtog">
    <button class="on" id="bCal">📅</button>
    <button id="bList">📋</button>
  </div>
  <button class="addbtn" id="bAdd">+ 추가</button>
</div>

<div class="wrap">
  <div class="cv" id="cv">
    <div class="chdr"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
    <div class="cgrid" id="cgrid"></div>
  </div>
  <div class="lv" id="lv"><div id="litems"></div></div>
</div>

<!-- 상세 모달 -->
<div class="bd h" id="dbd">
  <div class="modal">
    <div class="mhd"><h3 id="dname"></h3><button class="mcls" id="dcls">✕</button></div>
    <div class="mbody">
      <img id="dimg" class="mimg" style="display:none" alt="">
      <div class="mrow"><span class="mlbl2">기간</span><span id="ddate"></span></div>
      <div class="mrow"><span class="mlbl2">서버</span><span id="dsrv"></span></div>

      <div class="mrow" id="dsetsrow" style="display:none"><span class="mlbl2">관련 세트</span><div id="dsets" style="display:flex;flex-wrap:wrap;gap:6px"></div></div>
      <div id="dnote" class="mnote" style="display:none"></div>
      <div class="macts">
        <button class="bdel" id="bdel">삭제</button>
        <button class="bedit" id="bedit">편집</button>
      </div>
    </div>
  </div>
</div>

<!-- 폼 모달 -->
<div class="bd h" id="fbd">
  <div class="modal">
    <div class="mhd"><h3 id="ftitle">이벤트 추가</h3><button class="mcls" id="fcls">✕</button></div>
    <div class="mbody">
      <div class="fg"><label>이름</label><input type="text" id="fname"></div>
      <div class="fr">
        <div class="fg"><label>시작일</label><input type="date" id="fstart"></div>
        <div class="fg"><label>종료일</label><input type="date" id="fend"></div>
      </div>
      <div class="fg"><label>서버</label>
        <select id="fsrv2"><option value="jp">🇯🇵 일본</option><option value="na">🌎 북미</option><option value="all">공통</option></select>
      </div>
      <div class="fg"><label>이미지 URL (선택)</label><input type="text" id="fimg" placeholder="https://..."></div>
      <div class="fg"><label>관련 세트 (쉼표로 구분)</label><input type="text" id="fsets" placeholder="예: Stubborn Knight, Golden Knight"></div>
      <div class="fg"><label>설명/노트</label><textarea id="fnote"></textarea></div>
      <div class="fg"><label>색상</label><div class="cchips" id="cchips"></div><input type="hidden" id="fcolor" value="#f57f17"></div>
      <div class="facts"><button class="bcan" id="fcan">취소</button><button class="bsave" id="fsave">저장</button></div>
    </div>
  </div>
</div>

    note:'나는 겨울의 고요함을 시의 영감으로 간직했어요. 눈보라가 걷히고 나서, 작은 구슬 같은 두 눈과 마주쳤답니다.\n\n이벤트 기간 동안 로그인하면 아래 수트 아이템들을 우편함에서 받을 수 있어요!\n기간: 3/20 오전 10:00 ~ 3/27 오전 04:59 (KST)'
  },
  {id:'ev1',name:'모모의 퀘스트: Stubborn Knight',nameEn:"Momo's Quest: Stubborn Knight",start:'2026-03-19',end:'2026-03-26',server:'na',color:'#f57f17',img:'https://drive.google.com/thumbnail?id=11gc9H6webL4W0B1HLV3pJxP03aDKlOny&sz=w1000',sets:[{id:'Stubborn_Knight', name:'Stubborn Knight'}],note:'보상: 다이아몬드 ×30 + 스태미나 ×120 + 골드 ×26,666 + 스타 코인 ×15\n기간: 3/19 오후 10:00 ~ 3/26 오전 4:59 (KST)'}
];

var curY = new Date().getFullYear();
var curM = new Date().getMonth();
var editId = null;

function pad(n){ return String(n).padStart(2,'0'); }
function esc(s){ return String(s||'').replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];}); }
function fmt(d){ if(!d)return''; var p=d.split('-'); return p[0]+'.'+p[1]+'.'+p[2]; }
function srvLabel(id){ return id==='jp'?'🇯🇵 일본':id==='na'?'🌎 북미':'공통'; }
function srvCss(id){ return id==='jp'?'sj':id==='na'?'sn':'sa'; }

function filtered(){
  var sv = document.getElementById('fSrv').value;
  return EVENTS.filter(function(e){ return !sv || e.server===sv; });
}

function renderCal(){
  var grid = document.getElementById('cgrid');
  if(!grid) return;
  document.getElementById('mlbl').textContent = curY+'년 '+(curM+1)+'월';

  var first = new Date(curY,curM,1).getDay();
  var dim   = new Date(curY,curM+1,0).getDate();
  var now   = new Date();
  var ts    = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());

  var evs = filtered();

  // 날짜별 이벤트 맵
  var dem = {};
  evs.forEach(function(ev){
    if(!ev.start||!ev.end) return;
    var c = new Date(ev.start+'T00:00:00');
    var e = new Date(ev.end+'T00:00:00');
    while(c<=e){
      var k = c.getFullYear()+'-'+pad(c.getMonth()+1)+'-'+pad(c.getDate());
      if(!dem[k]) dem[k]=[];
      dem[k].push(ev);
      c.setDate(c.getDate()+1);
    }
  });

  // 슬롯 배치 (겹침 방지)
  var evSlot={}, slotUsed={};
  evs.forEach(function(ev){
    var c = new Date(ev.start+'T00:00:00');
    var e = new Date(ev.end+'T00:00:00');
    var dates=[];
    while(c<=e){ dates.push(c.getFullYear()+'-'+pad(c.getMonth()+1)+'-'+pad(c.getDate())); c.setDate(c.getDate()+1); }
    var slot=0;
    outer: while(true){
      for(var i=0;i<dates.length;i++){ if(slotUsed[slot+'_'+dates[i]]){slot++;continue outer;} }
      break;
    }
    evSlot[ev.id]=slot;
    dates.forEach(function(d){ slotUsed[slot+'_'+d]=ev.id; });
  });

  // 셀 생성
  var html='';
  var prevDim = new Date(curY,curM,0).getDate();
  for(var i=0;i<first;i++) html+='<div class="cell om"><span class="dn">'+(prevDim-first+1+i)+'</span></div>';

  for(var d=1;d<=dim;d++){
    var ds = curY+'-'+pad(curM+1)+'-'+pad(d);
    var isToday = ds===ts;
    var cel = dem[ds]||[];
    var maxSlot=0;
    cel.forEach(function(ev){ maxSlot=Math.max(maxSlot,(evSlot[ev.id]||0)+1); });

    var evHtml='';
    var maxShow=3;
    // 이미지는 슬롯 루프에서 각 이벤트별로 처리
    // 가로 flex로 모든 이벤트 나란히 배치
    var evCards = '';
    var count = cel.length;
    var cols = count<=1?1:count===2?2:3;
    var cardW = cols===1?100:cols===2?50:33.333;
    for(var s=0;s<maxSlot;s++){
      var ev=null;
      for(var j=0;j<cel.length;j++){ if((evSlot[cel[j].id]||0)===s){ev=cel[j];break;} }
      if(!ev) continue;
      var col=ev.color||'#f06292';
      var isS=ev.start===ds, isE=ev.end===ds;
      var pos=(isS&&isE)?'se':isS?'s':isE?'e':'m';
      if(ev.img){
        evCards += '<div data-id="'+ev.id+'" class="ev-card" style="flex:0 0 calc('+cardW+'% - 2px);min-width:0;cursor:pointer;border-radius:6px;overflow:hidden;border-bottom:3px solid '+col+'">'
          +'<img src="'+ev.img+'" alt="" style="width:100%;height:60px;object-fit:cover;object-position:center;display:block" onerror="this.style.display=\'none\'">'
          +'<div style="background:'+col+';padding:2px 4px;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(ev.name)+'</div>'
          +'</div>';
      } else {
        evCards += '<div data-id="'+ev.id+'" class="ev-card evbtn '+pos+'" style="flex:0 0 calc('+cardW+'% - 2px);min-width:0;cursor:pointer;background:'+col+';height:18px;display:flex;align-items:center;border-radius:4px">'
          +'<span style="font-size:9px;font-weight:700;color:#fff;padding:0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(ev.name)+'</span>'
          +'</div>';
      }
    }
    if(evCards) evHtml += '<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px">'+evCards+'</div>';
    
    

    html+='<div class="cell'+(isToday?' td':'')+'"><span class="dn">'+d+'</span>'+evHtml+'</div>';
  }

  var remain = (first+dim)%7===0?0:7-(first+dim)%7;
  for(var i=1;i<=remain;i++) html+='<div class="cell om"><span class="dn">'+i+'</span></div>';

  grid.innerHTML = html;
  grid.querySelectorAll('.ev-card').forEach(function(img){
    img.addEventListener('click',function(ev2){ ev2.stopPropagation(); openDetail(img.dataset.id); });
  });
  grid.querySelectorAll('.ev-img-big, .ev-imgs-row img, .ev-imgs-row .ev-img-ph').forEach(function(img){
    img.addEventListener('click',function(ev2){ ev2.stopPropagation(); openDetail(img.dataset.id); });
  });
  grid.querySelectorAll('[data-id]').forEach(function(b){
    b.addEventListener('click',function(ev2){ ev2.stopPropagation(); openDetail(b.dataset.id); });
  });
}

function renderList(){
  var el=document.getElementById('litems');
  if(!el) return;

  // 현재 달(curY/curM)과 겹치는 이벤트만
  var monthStart = curY+'-'+pad(curM+1)+'-01';
  var monthEnd   = curY+'-'+pad(curM+1)+'-'+pad(new Date(curY,curM+1,0).getDate());

  var evs=filtered().filter(function(ev){
    if(!ev.start||!ev.end) return false;
    // 이벤트가 이번 달과 겹치는지 (start <= monthEnd AND end >= monthStart)
    return ev.start<=monthEnd && ev.end>=monthStart;
  }).slice().sort(function(a,b){return a.start>b.start?1:-1;});

  if(!evs.length){el.innerHTML='<div style="color:var(--pm);padding:20px;text-align:center">이 달에는 이벤트가 없어요</div>';return;}
  el.innerHTML=evs.map(function(ev){
    var col=ev.color||'#f06292';
    var th=ev.img?'<img class="lth" src="'+esc(ev.img)+'" alt="" onerror="this.style.display=\'none\'">':'<div class="lph" style="background:'+col+'22">🌸</div>';
    return '<div class="litem" data-id="'+ev.id+'">'+th+'<div><div style="font-weight:700;font-size:13px;margin-bottom:2px">'+esc(ev.name)+(ev.nameEn&&ev.nameEn!==ev.name?' <span style="font-size:11px;color:var(--pm)">'+esc(ev.nameEn)+'</span>':'')+'</div><div style="font-size:11px;color:var(--pm);margin-bottom:3px">'+fmt(ev.start)+' ~ '+fmt(ev.end)+'</div><span class="badge '+srvCss(ev.server)+'">'+srvLabel(ev.server)+'</span></div></div>';
  }).join('');
  el.querySelectorAll('.litem').forEach(function(el2){ el2.addEventListener('click',function(){ openDetail(el2.dataset.id); }); });
}

function openDetail(id){
  var ev=EVENTS.find(function(e){return e.id===id;});
  if(!ev) return;
  document.getElementById('dname').textContent=ev.name;
  document.getElementById('ddate').textContent=fmt(ev.start)+' ~ '+fmt(ev.end);
  document.getElementById('dsrv').innerHTML='<span class="badge '+srvCss(ev.server)+'">'+srvLabel(ev.server)+'</span>';

  var im=document.getElementById('dimg');
  if(ev.img){im.src=ev.img;im.style.display='block';}else im.style.display='none';
  var setsrow=document.getElementById('dsetsrow');
  var setsDiv=document.getElementById('dsets');
  if(ev.sets && ev.sets.length){
    setsDiv.innerHTML=ev.sets.map(function(s){
      var sname = (typeof s === 'object') ? s.name : s;
        var sid   = (typeof s === 'object') ? s.id   : s;
        return '<button class="set-btn" data-setid="'+sid+'" data-setname="'+sname.replace(/"/g,'&quot;')+'">📦 '+sname+'</button>';
    }).join('');
    setsrow.style.display='flex';
    // 버튼 클릭 이벤트
    setTimeout(function(){
      setsDiv.querySelectorAll('.set-btn').forEach(function(btn){
        btn.addEventListener('click', function(){ openSetById(btn.dataset.setid, btn.dataset.setname); });
      });
    }, 0);
  } else { setsrow.style.display='none'; }
  var nt=document.getElementById('dnote');
  if(ev.note){nt.textContent=ev.note;nt.style.display='block';}else nt.style.display='none';
  document.getElementById('bdel').dataset.id=id;
  document.getElementById('bedit').dataset.id=id;
  document.getElementById('dbd').classList.remove('h');
}
function closeDetail(){document.getElementById('dbd').classList.add('h');}

function buildChips(){
  var w=document.getElementById('cchips');
  if(!w||w.dataset.built) return;
  w.dataset.built='1';
  w.innerHTML=COLORS.map(function(c){return '<div class="cc" data-c="'+c+'" style="background:'+c+'"></div>';}).join('');
  w.querySelectorAll('.cc').forEach(function(ch){
    ch.addEventListener('click',function(){
      w.querySelectorAll('.cc').forEach(function(x){x.classList.remove('on');});
      ch.classList.add('on');
      document.getElementById('fcolor').value=ch.dataset.c;
    });
  });
}
function setChip(col){ document.getElementById('cchips').querySelectorAll('.cc').forEach(function(ch){ch.classList.toggle('on',ch.dataset.c===col);}); }

function openForm(ev){
  editId=ev?ev.id:null;
  document.getElementById('ftitle').textContent=ev?'이벤트 편집':'이벤트 추가';
  document.getElementById('fname').value=ev?ev.name:'';

  document.getElementById('fstart').value=ev?ev.start:'';
  document.getElementById('fend').value=ev?ev.end:'';
  document.getElementById('fsrv2').value=ev?ev.server:'jp';
  document.getElementById('fimg').value=ev?ev.img:'';
  document.getElementById('fsets').value=ev&&ev.sets?ev.sets.join(', '):'';
  document.getElementById('fnote').value=ev?ev.note:'';
  document.getElementById('fcolor').value=ev?ev.color:'#f57f17';
  buildChips(); setChip(ev?ev.color:'#f57f17');
  document.getElementById('fbd').classList.remove('h');
}
function closeForm(){document.getElementById('fbd').classList.add('h');editId=null;}
function saveForm(){
  var name=document.getElementById('fname').value.trim();
  var start=document.getElementById('fstart').value;
  var end=document.getElementById('fend').value;
  if(!name||!start||!end){alert('이름, 시작일, 종료일은 필수예요');return;}
  if(start>end){alert('종료일이 시작일보다 빨라요');return;}
  var setsRaw=document.getElementById('fsets').value.trim();
  var sets=setsRaw?setsRaw.split(',').map(function(s){return s.trim();}).filter(Boolean):[];
  var ev={id:editId||uid(),name:name,nameEn:'',start:start,end:end,server:document.getElementById('fsrv2').value,img:document.getElementById('fimg').value.trim(),note:document.getElementById('fnote').value.trim(),color:document.getElementById('fcolor').value,sets:sets};
  if(editId){var idx=EVENTS.findIndex(function(e){return e.id===editId;});if(idx>=0)EVENTS[idx]=ev;}
  else EVENTS.push(ev);
  closeForm();renderCal();renderList();
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function openSet(name){
  try{
    var p = window.parent || window.top;
    if(p && p !== window){
      p.postMessage({type:'CALENDAR_OPEN_SET', setName: name}, '*');
    }
  }catch(e){}
}
function openSetById(setId, setName){
  try{
    var p = window.parent || window.top;
    if(p && p !== window){
      p.postMessage({type:'CALENDAR_OPEN_SET_BY_ID', setId: setId, setName: setName}, '*');
    }
  }catch(e){}
}
function delEv(id){if(!confirm('삭제할까요?'))return;EVENTS=EVENTS.filter(function(e){return e.id!==id;});closeDetail();renderCal();renderList();}

function showCal(){document.getElementById('cv').classList.remove('off');document.getElementById('lv').classList.remove('on');document.getElementById('bCal').classList.add('on');document.getElementById('bList').classList.remove('on');}
function showList(){document.getElementById('cv').classList.add('off');document.getElementById('lv').classList.add('on');document.getElementById('bList').classList.add('on');document.getElementById('bCal').classList.remove('on');renderList();}

// 초기화
renderCal();

document.getElementById('bPrev').addEventListener('click',function(){curM--;if(curM<0){curM=11;curY--;}renderCal();if(document.getElementById('lv').classList.contains('on')) renderList();});
document.getElementById('bNext').addEventListener('click',function(){curM++;if(curM>11){curM=0;curY++;}renderCal();if(document.getElementById('lv').classList.contains('on')) renderList();});
document.getElementById('bToday').addEventListener('click',function(){curY=new Date().getFullYear();curM=new Date().getMonth();showCal();renderCal();});
document.getElementById('fSrv').addEventListener('change',function(){renderCal();renderList();});
document.getElementById('bCal').addEventListener('click',showCal);
document.getElementById('bList').addEventListener('click',showList);
document.getElementById('bAdd').addEventListener('click',function(){openForm(null);});
document.getElementById('dcls').addEventListener('click',closeDetail);
document.getElementById('dbd').addEventListener('click',function(e){if(e.target===e.currentTarget)closeDetail();});
document.getElementById('bdel').addEventListener('click',function(e){delEv(e.currentTarget.dataset.id);});
document.getElementById('bedit').addEventListener('click',function(e){var ev=EVENTS.find(function(x){return x.id===e.currentTarget.dataset.id;});closeDetail();openForm(ev);});
document.getElementById('fcls').addEventListener('click',closeForm);
document.getElementById('fcan').addEventListener('click',closeForm);
document.getElementById('fbd').addEventListener('click',function(e){if(e.target===e.currentTarget)closeForm();});
document.getElementById('fsave').addEventListener('click',saveForm);
</script>
