<!doctype html>
<html lang="ko">
<head>
<style id="custom-font">
@font-face {
  font-family: "AngyeongGothic";
  src: url("Ba안경고딕_김영화_cej8784_naver_com_.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
* { font-family: "AngyeongGothic", system-ui, AppleSDGothicNeo, sans-serif !important; }
.badge, .pill, .pill-small, .tag-pill, .tag-chip,
.chip, .gtab, .skill, .countpill { font-size: 14px !important; }
.sc-num, .chip .v, .pill-small .v { font-weight: 700 !important; }
.tl-title-id, .tl-title-sub, .tl-speaker, .tl-kr-trans { font-weight: 700 !important; }
.score, .badge { font-weight: 700 !important; }
.badge.tag, .tag-pill, .tag-chip { font-weight: 400 !important; }
</style>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>세트정보</title>
<style>
body{margin:0;font-family:system-ui,AppleSDGothicNeo,sans-serif;background:#f7f7fb}
.wrap{padding:12px}
.section{background:#fff;border:1px solid #eee;border-radius:16px;padding:12px}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.gimg{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px;border:1px solid #eee}
.setDesc{margin-top:10px;padding:12px 14px;border-radius:14px;background:#f3f4ff;border:1px solid #e3e6ff;font-size:16px;line-height:1.7;color:#2b2f55}
</style>
</head>
<body>
<div class="wrap">
  <div class="section">
    <h3>세트사진</h3>
    <div class="gallery" id="gallery"></div>
    <div id="setDesc" class="setDesc" style="display:none"></div>
  </div>
</div>

<iframe src="sets_data.html" style="display:none"></iframe>

<script>
(function(){
  const gallery = document.getElementById("gallery");
  const setDesc = document.getElementById("setDesc");

  window.addEventListener("message", (ev)=>{
    if(ev.origin !== location.origin && ev.origin !== 'null') return;
    if(ev.data && ev.data.__splitData && ev.data.key==="sets"){
      const set = ev.data.data[0];
      gallery.innerHTML="";
      for(const u of set.images){
        const img=document.createElement("img");
        img.className="gimg";
        img.src=u;
        img.loading="lazy";
        img.decoding="async";
        gallery.appendChild(img);
      }
      if(set.desc){
        setDesc.textContent=set.desc;
        setDesc.style.display="block";
      }
    }
  });
})();
</script>
</body>
</html>
