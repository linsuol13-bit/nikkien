<style id="custom-font">
@font-face {
  font-family: "AngyeongGothic";
  src: url("Ba안경고딕_김영화_cej8784_naver_com_.ttf") format("truetype");

}

<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>세트정보</title>
<!-- sets_frame_fixed_v3 2026-02-06 -->
<style>
  :root{
    --pk-1:#e91e8c;--pk-2:#f06292;--pk-3:#f48fb1;
    --pk-4:#fce4ec;--pk-5:#fff5f8;
    --pk-border:#f8bbd0;
    --pk-grad:linear-gradient(135deg,#e91e8c,#f06292);
    --pk-muted:#a06080;
    --pk-shadow:0 4px 16px rgba(233,30,140,.08);
    --pk-text:#2d1a22;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,AppleSDGothicNeo,'Segoe UI',Roboto,sans-serif;background:var(--pk-5);color:var(--pk-text)}
  ::-webkit-scrollbar{width:7px;height:7px}
  ::-webkit-scrollbar-track{background:var(--pk-5);border-radius:999px}
  ::-webkit-scrollbar-thumb{background:var(--pk-3);border-radius:999px}
  ::-webkit-scrollbar-thumb:hover{background:var(--pk-2)}
  *{scrollbar-width:thin;scrollbar-color:var(--pk-3) var(--pk-5)}
  .wrap{padding:12px}
  .topbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .title{font-weight:500;font-size:19px;color:var(--pk-1)}
  .muted{color:var(--pk-muted);font-size:14px}
  input[type=text]{padding:8px 12px;border:1.5px solid var(--pk-border);border-radius:10px;background:#fff;min-width:220px;color:var(--pk-text);font-family:inherit;outline:none}
  input[type=text]:focus{border-color:var(--pk-2);box-shadow:0 0 0 3px rgba(233,30,140,.1)}
  /* 카드 그리드 */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
  .card{background:#fff;border:1.5px solid var(--pk-border);border-radius:16px;overflow:hidden;cursor:pointer;box-shadow:var(--pk-shadow);transition:transform .13s,box-shadow .13s,border-color .13s;position:relative}
  .card::before{content:'';display:block;height:3px;background:var(--pk-grad)}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(233,30,140,.14);border-color:var(--pk-2)}
  /* 스포일러 카드 */
  .card.spoiler .thumb{filter:blur(12px) brightness(0.7);transform:scale(1.08);transition:filter .3s,transform .3s}
  .card.spoiler .meta{filter:blur(5px);transition:filter .3s;user-select:none}
  .spoiler-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(45,26,34,.72);color:#fff;font-size:13px;font-weight:600;padding:6px 14px;border-radius:999px;pointer-events:none;z-index:5;white-space:nowrap;transition:opacity .3s}
  /* 스포일러 확인 팝업 */
  .spoiler-confirm-overlay{display:none;position:fixed;inset:0;background:rgba(45,26,34,.55);z-index:9999;align-items:center;justify-content:center}
  .spoiler-confirm-overlay.show{display:flex}
  .spoiler-confirm-box{background:#fff;border-radius:20px;padding:28px 28px 22px;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(233,30,140,.2);text-align:center;display:flex;flex-direction:column;gap:16px}
  .spoiler-confirm-icon{font-size:36px}
  .spoiler-confirm-title{font-size:17px;font-weight:600;color:var(--pk-text);line-height:1.4}
  .spoiler-confirm-desc{font-size:14px;color:var(--pk-muted);line-height:1.5}
  .spoiler-confirm-btns{display:flex;gap:10px;justify-content:center}
  .spoiler-confirm-btns button{flex:1;padding:10px 0;border-radius:12px;border:1.5px solid var(--pk-border);font-size:15px;font-weight:600;cursor:pointer;transition:background .13s,color .13s}
  .spoiler-btn-yes{background:var(--pk-grad);color:#fff;border-color:transparent !important}
  .spoiler-btn-yes:hover{opacity:.88}
  .spoiler-btn-no{background:#fff;color:var(--pk-muted)}
  .spoiler-btn-no:hover{background:var(--pk-4);color:var(--pk-1)}
  .thumb{width:100%;height:220px;object-fit:cover;background:var(--pk-5);display:block}
  .card .meta{padding:10px 10px 12px 10px;display:flex;flex-direction:column;gap:6px}
  /* 완성도 바 */
  .completion-bar-wrap{margin-top:4px}
  .completion-bar-bg{height:5px;border-radius:999px;background:var(--pk-4);overflow:hidden}
  .completion-bar-fill{height:100%;border-radius:999px;background:var(--pk-grad);transition:width .3s}
  .completion-text{font-size:13px;font-weight:500;margin-bottom:3px;color:var(--pk-1)}
  /* 보유 배지 */
  .pitem.owned-yes{border-color:#bbf7d0;background:#f0fdf4}
  .pitem.owned-no{border-color:#fecaca;background:#fff5f5}
  .owned-badge{font-size:12px;font-weight:500;padding:2px 7px;border-radius:999px;margin-left:auto;flex-shrink:0}
  .owned-badge.yes{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
  .owned-badge.no{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
  /* 변형(리폼/포즈) 완성도 칩 */
  .variant-chip{display:inline-block;font-size:12px;font-weight:500;padding:2px 8px;border-radius:999px;margin-top:2px}
  /* 미보유 필터 토글 */
  .filter-toggle{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;border:1.5px solid var(--pk-border);background:#fff;font-size:14px;font-weight:500;color:var(--pk-muted);cursor:pointer;transition:background .13s,border-color .13s,color .13s;user-select:none}
  .filter-toggle.active{background:var(--pk-grad);border-color:transparent;color:#fff}
  /* variants 완성도 헤더 */
  .vgroup-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 8px 0;flex-wrap:wrap}
  .vgroup-pct{font-size:13px;font-weight:500;padding:2px 10px;border-radius:999px;background:var(--pk-4);color:var(--pk-1)}
  /* 미보유 섹션 */
  #missingSection{display:none}
  .missing-count-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;background:#fee2e2;color:#dc2626;font-size:13px;font-weight:500;border:1px solid #fecaca;margin-left:6px}
  /* 텍스트 */
  .name{font-weight:500;font-size:17px;line-height:1.2;color:var(--pk-text)}
  .sub{font-size:14px;color:var(--pk-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pillrow{display:flex;gap:6px;flex-wrap:wrap}
  .pill{font-size:13px;border:1.5px solid var(--pk-border);padding:3px 8px;border-radius:999px;background:var(--pk-5);color:var(--pk-text)}
  .empty{padding:22px 6px;color:var(--pk-muted)}
  /* 페이저 */
  .pager{display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap;margin:14px 0 6px}
  .pbtn{border:1.5px solid var(--pk-border);background:#fff;border-radius:10px;padding:6px 10px;font-size:14px;cursor:pointer;color:var(--pk-text);transition:background .13s,border-color .13s}
  .pbtn:hover{background:var(--pk-4);border-color:var(--pk-2)}
  .pbtn[disabled]{opacity:.45;cursor:default}
  .pbtn[disabled]:hover{background:#fff;border-color:var(--pk-border)}
  .pbtn.active{background:var(--pk-grad);color:#fff;border-color:transparent}
  .pdots{color:var(--pk-muted);font-size:14px;padding:0 4px}
  /* 다이얼로그 */
  dialog{border:0;padding:0;border-radius:20px;max-width:min(980px,96vw);width:980px;box-shadow:0 20px 70px rgba(233,30,140,.18)}
  dialog::backdrop{background:rgba(45,26,34,.45)}
  .dlg{display:flex;flex-direction:column;max-height:88vh;background:#fff;border-radius:20px;overflow:hidden}
  .dlgHead{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:14px 16px;border-bottom:1.5px solid var(--pk-border);background:linear-gradient(135deg,var(--pk-5),var(--pk-4));position:sticky;top:0;z-index:10}
  .dlgTitle{display:flex;flex-direction:column;gap:4px}
  .dlgTitle .main{font-weight:500;font-size:22px;color:var(--pk-1)}
  .dlgTitle .names{font-size:14px;color:var(--pk-muted);display:flex;flex-direction:column;gap:2px}
  .close{border:1.5px solid var(--pk-border);background:#fff;border-radius:12px;padding:8px 10px;cursor:pointer;color:var(--pk-muted);transition:background .13s,color .13s}
  .close:hover{background:var(--pk-4);color:var(--pk-1)}
  .dlgBody{padding:14px 16px;overflow:auto;background:var(--pk-5)}
  .section{background:#fff;border:1.5px solid var(--pk-border);border-radius:16px;padding:12px;margin-bottom:12px}
  .section h3{margin:0 0 8px 0;font-size:17px;font-weight:500;color:var(--pk-1)}
  /* 획득경로 강조 */
  .acqSection{border:2px solid var(--pk-border);background:linear-gradient(135deg,var(--pk-5),#fff)}
  .acqHead{display:flex;align-items:center;gap:10px;margin:0 0 10px 0}
  .acqBadge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:14px;font-weight:500;background:var(--pk-grad);color:#fff}
  .acqTitle{font-size:18px;font-weight:500;color:var(--pk-1)}
  /* 이벤트/공략 박스 */
  .eventPlain{margin-bottom:12px}
  .eventPlain h3{margin:0 0 10px 0;font-size:18px;font-weight:500;color:var(--pk-1)}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .gimg{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px;border:1.5px solid var(--pk-border);background:var(--pk-5);cursor:zoom-in;transition:transform .13s}
  .gimg:hover{transform:scale(1.02)}
  .sources{display:flex;flex-direction:column;gap:6px}
  .src{display:flex;gap:8px;align-items:flex-start}
  .src .k{min-width:110px;font-weight:500;font-size:14px;color:var(--pk-1)}
  .src .v{font-size:14px;color:var(--pk-text);white-space:pre-wrap}
  .guide{margin-top:8px;padding-top:8px;border-top:1px dashed var(--pk-border);font-size:14px;color:var(--pk-text);white-space:pre-wrap}
  .parts{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .pitem{display:flex;gap:10px;align-items:center;border:1.5px solid var(--pk-border);border-radius:14px;padding:10px;background:#fff;cursor:pointer;transition:background .13s,border-color .13s}
  .pitem:hover{background:var(--pk-5);border-color:var(--pk-2)}
  .pimg{width:56px;height:56px;border-radius:12px;object-fit:cover;border:1.5px solid var(--pk-border);background:var(--pk-5)}
  .pmeta{display:flex;flex-direction:column;gap:2px;min-width:0}
  .pname{font-weight:500;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ppart{font-size:14px;color:var(--pk-muted)}
  .code{font-size:13px;color:var(--pk-muted)}
  /* 이벤트/공략 강조 박스 */
  .eventBox{border:2px solid var(--pk-border);background:var(--pk-5);border-radius:16px;padding:12px;margin-top:10px}
  .guideBox{border:2px solid #bae6fd;background:#f0f9ff;border-radius:16px;padding:12px;margin-top:10px}
  .hdr{display:flex;align-items:center;gap:10px;font-weight:500}
  .hdr .ico{font-size:22px}
  .hdr .tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:14px;font-weight:500}
  .hdr .tag-event{background:var(--pk-grad);color:#fff}
  .hdr .tag-guide{background:#0ea5e9;color:#fff}
  .hdr .title{font-size:17px;font-weight:500;color:var(--pk-1)}
  .eventBox .body{margin-top:8px;font-size:16px;color:var(--pk-text);white-space:pre-wrap;line-height:1.7}
  .guideBox .body{margin-top:8px;font-size:16px;color:#0c4a6e;white-space:pre-wrap;line-height:1.7}
  /* 이미지 줌 */
  .zoomDlg{max-width:min(980px,96vw);width:980px}
  .zoomBox{background:#000;border-radius:18px;overflow:hidden}
  .zoomImg{width:100%;height:auto;display:block}
  /* 세트 설명 */
  .setDesc{margin-top:10px;padding:12px 14px;border-radius:14px;background:var(--pk-5);border:1.5px solid var(--pk-border);font-size:16px;line-height:1.7;color:var(--pk-text)}
  /* 진화 */
  .evoStage{margin-top:14px}
  .evoHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 8px 0}
  .evoTitle{font-weight:500;font-size:16px;color:var(--pk-1)}
  .evoSub{font-weight:500;font-size:14px;color:var(--pk-muted);margin:8px 0}
  .vgroup{margin-top:10px}
  .vtitle{font-weight:500;font-size:16px;margin:0 0 8px 0;color:var(--pk-1)}
  .vlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  /* source-list (획득경로) */
  .source-list{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:8px}
  .source-list li{padding:5px 12px;border-radius:999px;background:#fff;border:1.5px solid var(--pk-border);font-weight:500;color:var(--pk-1);font-size:14px;transition:background .13s}
  .source-list li:hover{background:var(--pk-4)}
  .source-list li::before{content:none}

  /* ── 다크모드 ── */
  body.dark{--pk-5:#1a1018;--pk-text:#f0e4ec;--pk-border:#4a2d3a;--pk-4:#2a1a2a;--pk-muted:#c0849c;background:#1a1018;color:#f0e4ec}
  body.dark input[type=text]{background:#27202a;border-color:#4a2d3a;color:#f0e4ec}
  body.dark select{background:#27202a;border-color:#4a2d3a;color:#f0e4ec}
  body.dark .card{background:#27202a;border-color:#4a2d3a}
  body.dark .thumb{background:#fff}
  body.dark .filter-toggle{background:#27202a;border-color:#4a2d3a;color:#c0849c}
  body.dark .filter-toggle.on{background:var(--pk-grad);border-color:transparent;color:#fff}
  body.dark .pbtn{background:#27202a;border-color:#4a2d3a;color:#f0e4ec}
  body.dark .pbtn:hover{background:#2a1a2a}
  body.dark .pbtn[disabled]:hover{background:#27202a;border-color:#4a2d3a}
  body.dark .dlg{background:#27202a}
  body.dark .close{background:#27202a;border-color:#4a2d3a;color:#c0849c}
  body.dark .close:hover{background:#2a1a2a}
  body.dark .section{background:#27202a;border-color:#4a2d3a}
  body.dark .pitem{background:#1a1018;border-color:#4a2d3a}
  body.dark .pitem:hover{background:#2a1a2a}
  body.dark .pitem.owned-yes{background:#0a2a14;border-color:#166534}
  body.dark .pitem.owned-no{background:#2a0a0a;border-color:#7f1d1d}
  body.dark .spoiler-confirm-box{background:#27202a}
  body.dark .spoiler-btn-no{background:#27202a;color:#c0849c}
  body.dark .source-list li{background:#1a1018;border-color:#4a2d3a;color:#f48fb1}
  body.dark .guideBox{background:#0e1a2a;border-color:#1e3a6a}
  body.dark .guideBox .body{color:#7dd3f8}
  body.dark ::-webkit-scrollbar-track{background:#1a1018}
  body.dark ::-webkit-scrollbar-thumb{background:#4a2d3a}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title" id="sf_listTitle">세트 목록</div>
    <input id="q" type="text" placeholder="세트 이름 검색 (한/중/영/북미)"/>
    <label class="filter-toggle" id="missingFilterToggle">
      <input type="checkbox" id="missingFilterCb"> <span id="sf_missingFilter">✗ 미보유 있는 세트만</span>
    </label>
    <select id="sortSel" style="height:32px;padding:0 8px;border:1.5px solid var(--pk-border);border-radius:8px;background:#fff;font-size:13px;color:var(--pk-text);cursor:pointer;">
      <option value="default" id="sf_sortDefault">기본 순서</option>
      <option value="owned_desc" id="sf_sortOwnedDesc">보유 많은 순</option>
      <option value="owned_asc" id="sf_sortOwnedAsc">보유 적은 순</option>
      <option value="pct_desc" id="sf_sortPctDesc">완성도 높은 순</option>
      <option value="pct_asc" id="sf_sortPctAsc">완성도 낮은 순</option>
    </select>
    <div class="muted" id="status">로딩중...</div>
  </div>

  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none"><span id="sf_emptyMsg">세트 데이터가 비어있어. (sets_data.html에 세트 추가해줘)</span></div>
  <div id="pager" class="pager" style="display:none"></div>
</div>

<dialog id="dlg">
  <div class="dlg">
    <div class="dlgHead">
      <div class="dlgTitle">
        <div class="main" id="dlgMain">-</div>
        <div class="names" id="dlgNames"></div>
        <div id="dlgCompletion" style="margin-top:6px;display:none"></div>
      </div>
      <button class="close" id="closeBtn" type="button">닫기</button>
    </div>
    <div class="dlgBody">
      <div class="section">
        <h3 id="sf_h3Photo">세트사진</h3>
        <div class="gallery" id="gallery"></div>
        <div id="setDesc" class="setDesc" style="display:none"></div>
      </div>

      <div class="section acqSection" id="acqSection">
        <div class="acqHead">
          <span class="acqBadge" id="sf_acqBadge">📍 세트 획득경로</span>
        </div>
        <div class="sources" id="sources"></div>
      </div>

      <!-- 이벤트 영역은 내부에 이미 강조 박스(eventBox/guideBox)가 있으니, 바깥 섹션 박스는 제거해서 중첩 박스 느낌을 없앰 -->
      <div id="eventSection" class="eventPlain" style="display:none">
        <div class="sources" id="eventInfo"></div>
      </div>

      <div class="section">
        <h3 id="sf_h3Parts">세트 부위별 정보</h3>
        <div class="muted" style="margin-bottom:8px" id="sf_partsHint">부위를 클릭하면 해당 의상 상세페이지가 열려.</div>
        <div class="parts" id="parts"></div>
      </div>

      <div class="section" id="variantsSection" style="display:none">
        <h3 id="sf_h3Variants">리폼 · 진화 · 포즈</h3>
        <div class="muted" style="margin-bottom:8px" id="sf_variantsHint">파생 의상을 클릭하면 해당 아이템 상세페이지가 열려.</div>
        <div class="vlist" id="variants"></div>
      </div>

      <div class="section" id="missingSection" style="display:none;border:2px solid #fecaca;background:#fff5f5">
        <h3 style="color:#dc2626" id="sf_h3Missing">✗ <span id="sf_missingTitle">미보유 아이템</span> <span id="missingCount" class="missing-count-badge"></span></h3>
        <div class="muted" style="margin-bottom:8px" id="sf_missingDesc">아직 등록되지 않은 아이템 목록이야.</div>
        <div class="parts" id="missingList"></div>
      </div>

    </div>
  </div>
</dialog>

<dialog id="zoomDlg" class="zoomDlg">
  <div class="zoomBox">
    <img id="zoomImg" class="zoomImg" src="" alt="">
  </div>
</dialog>

<!-- Loaders (file:// safe) -->
<iframe id="setsLoader" src="sets_data.html" style="display:none"></iframe>
<iframe id="itemsLoader" src="items.html" style="display:none"></iframe>
<script>
(function(){
  // fallback: iframe onload에서 직접 contentWindow.SETS 읽기 (postMessage 실패 대비)
  function tryReadFrame(frameId, key, delay){
    setTimeout(function(){
      try{
        var f = document.getElementById(frameId);
        if(!f || !f.contentWindow) return;
        var data = key==='sets' ? f.contentWindow.SETS : f.contentWindow.ITEMS;
        if(Array.isArray(data) && data.length > 0){
          window.dispatchEvent(new MessageEvent('message', {
            data: {__splitData:true, key:key, data:data}
          }));
        }
      }catch(e){}
    }, delay||800);
  }
  document.addEventListener('DOMContentLoaded', function(){
    var sl = document.getElementById('setsLoader');
    var il = document.getElementById('itemsLoader');
    if(sl) sl.addEventListener('load', function(){ tryReadFrame('setsLoader','sets',300); });
    if(il) il.addEventListener('load', function(){ tryReadFrame('itemsLoader','items',300); });
    setTimeout(function(){ tryReadFrame('setsLoader','sets',0); tryReadFrame('itemsLoader','items',0); }, 2000);
    // 다크 상태 요청

  });
})();
</script>

<script>
(function(){
  const $ = (id)=>document.getElementById(id);
  const grid = $("grid");
  const empty = $("empty");
  const status = $("status");
  const q = $("q");
  const pager = $("pager");

  // pagination
  const PER_PAGE = 20;
  let currentPage = 1;

  // --- iframe auto-resize (monotonic: never report smaller height) ---
  let __ph_raf = 0;
  let __ph_max = 0;

  function __measureHeight(){
    return Math.max(
      document.body.scrollHeight || 0,
      document.documentElement.scrollHeight || 0
    );
  }

  function postHeightMonotonic(force=false){
    try{
      const h = Math.floor(__measureHeight());
      if(force) __ph_max = Math.max(__ph_max, h);
      else if(h > __ph_max) __ph_max = h;
      else return; // ✅ never send smaller height
      parent.postMessage({__iframeHeight: __ph_max, __frame:"sets"}, "*");
    }catch(e){}
  }

  function schedulePostHeight(force=false){
    if(__ph_raf) cancelAnimationFrame(__ph_raf);
    __ph_raf = requestAnimationFrame(()=>postHeightMonotonic(force));
  }


  const dlg = $("dlg");
  const closeBtn = $("closeBtn");
  const dlgMain = $("dlgMain");
  const dlgNames = $("dlgNames");
  const gallery = $("gallery");
  const setDesc = $("setDesc");
  const sources = $("sources");
  const parts = $("parts");
  const variantsSection = $("variantsSection");
  const variants = $("variants");
  const eventSection = $("eventSection");
  const eventInfo = $("eventInfo");

  const zoomDlg = $("zoomDlg");
  const zoomImg = $("zoomImg");
  const missingFilterToggle = $("missingFilterToggle");
  const missingFilterCb = $("missingFilterCb");
  const sortSel = $("sortSel");
  const missingSection = $("missingSection");
  const missingList = $("missingList");
  const missingCount = $("missingCount");

  let SETS = [];
  let ITEMS = [];
  let OWNED_NAMES = new Set(); // 보유 의상 이름 목록 (fallback)
  let OWNED_CODES = new Set(); // 보유 의상 코드 목록 (코드::부위 or 코드 형식)

  // 세트의 기본 파츠 + 모든 변형 파츠를 합산해서 반환
  function getAllSetParts(set){
    const result = [];
    const base = Array.isArray(set.parts) ? set.parts : [];
    base.forEach(p => result.push(p));
    const vlist = Array.isArray(set.variants) ? set.variants : [];
    vlist.forEach(v => {
      if(v.type === "evolve" && Array.isArray(v.stages)){
        v.stages.forEach(stg => {
          (Array.isArray(stg.items)?stg.items:[]).forEach(it => result.push(it));
          (Array.isArray(stg.reform)?stg.reform:[]).forEach(it => result.push(it));
        });
      } else {
        (Array.isArray(v.items)?v.items:[]).forEach(it => result.push(it));
      }
    });
    return result;
  }

  // 이름 정규화 (공백·특수문자 제거, 소문자)
  function normName(s){ return String(s||'').replace(/[\s\-·・''`]/g,'').toLowerCase(); }
  function isOwned(name){ return OWNED_NAMES.has(normName(name)); }

  // 코드 기반 보유 확인
  function isOwnedByCode(code, part){
    if(code === null || code === undefined || code === '') return false;
    const c = String(code);
    const p = String(part || '');
    // "코드::부위" 형식으로 정확히 체크
    if(p && OWNED_CODES.has(c + '::' + p)) return true;
    // OWNED_CODES 내에 같은 코드+부위 항목 확인
    for(const entry of OWNED_CODES){
      if(entry.startsWith(c + '::')){
        // 부위가 지정된 경우: 입력 부위와 일치해야만 보유로 인정
        if(p){
          const entryPart = entry.slice(c.length + 2);
          if(entryPart === p) return true;
          if(entryPart.startsWith(p + ' -') || entryPart.startsWith(p + '-')) return true;
          if(p.startsWith(entryPart + ' -') || p.startsWith(entryPart + '-')) return true;
        } else {
          return true;
        }
      }
      // 코드만 단독으로 저장된 경우 (숫자만 입력된 케이스)
      if(entry === c) return true;
    }
    return false;
  }

  // 보유 목록 업데이트
  function updateOwned(names){
    // names 배열에 "코드::부위" 형식이 있으면 코드 기반으로 처리
    const codeEntries = [];
    const nameEntries = [];
    (names || []).forEach(function(s){
      s = String(s || '').trim();
      if(!s) return;
      // "숫자::부위" 형식이면 코드 기반 (코드 단독은 추가하지 않음 - 다른 부위 오매칭 방지)
      if(/^\d+::/.test(s)){
        codeEntries.push(s);
      } else if(/^\d+$/.test(s)){
        // 숫자만 입력된 경우도 코드로 처리 (코드::'' 형태로 저장하지 않고 단독 유지)
        codeEntries.push(s);
      } else {
        nameEntries.push(normName(s));
      }
    });
    OWNED_CODES = new Set(codeEntries.filter(Boolean));
    OWNED_NAMES = new Set(nameEntries.filter(Boolean));
    // 열려있는 세트 상세 새로고침
    renderList();
  }
  let BYKEY = Object.create(null);
let BYCODE = Object.create(null);

  function norm(s){ return (s==null) ? "" : String(s); }
  function hasVariantType(set, type){
    const v = Array.isArray(set && set.variants) ? set.variants : [];
    const t = String(type||"").toLowerCase();
    return v.some(x => String((x && x.type)||"").toLowerCase() === t);
  }

function trim(s){ return norm(s).trim(); }

  function itemKey(part, code){
    return trim(part) + "||" + String(code);
  }

  function buildItemIndex(){
    const by = Object.create(null);
    const byCode = Object.create(null);

    for(const it of ITEMS){
      const part = trim(it.part);
      const code = it.code;
      if(!part || code==null) continue;

      by[itemKey(part, code)] = it;

      const ckey = String(code);
      // ✅ Only index codes for 장식/특수 to avoid matching 헤어/원피스 etc.
      if(part.startsWith("장식") || part.startsWith("특수")){
        if(!(ckey in byCode)) byCode[ckey] = it; // keep first if duplicates
      }
    }
    BYKEY = by;
    BYCODE = byCode;
  }

  // Auto-resolve part for simplified set data: allow part="장식" or part="특수" (or empty)
  function resolvePartAndItem(rawPart, code){
    const p0 = trim(rawPart);
    const c0 = (code==null) ? "" : String(code);
    let part = p0;
    let item = (part && c0!=="") ? (BYKEY[itemKey(part, c0)] || null) : null;

    if(!item && c0!==""){
      const itByCode = BYCODE[c0] || null;
      if(itByCode){
        const ip = trim(itByCode.part);
        const wantAuto = (!part || part==="장식" || part==="특수");
        if(wantAuto){
          // ✅ Safety: only accept resolved parts that are also 장식/특수
          if(ip.startsWith("장식") || ip.startsWith("특수")){
            part = ip;
            item = itByCode;
          }
        }
      }
    }
    return { part, item };
  }

  // ✅ 리스트 화면에서는 중국어를 보여주지 않음 (영어/일본어 우선)
  function listMainName(set){
    if(window.NIKKI_SERVER === 'jp'){
      // 일본: 일본어 먼저
      return trim(set.name_jp) || trim(set.name_en) || trim(set.name_na) || trim(set.name_kr) || trim(set.name) || "이름없음";
    }
    // 북미: 영어 먼저
    return trim(set.name_en) || trim(set.name_na) || trim(set.name_jp) || trim(set.name_kr) || trim(set.name) || "이름없음";
  }

  function listSubName(set){
    if(window.NIKKI_SERVER === 'jp'){
      // 일본: 서브에 영어
      return trim(set.name_en) || trim(set.name_na) || "";
    }
    // 북미: 서브에 일본어
    return trim(set.name_jp) || "";
  }

  // ✅ 상세 팝업에서는 중국어 포함 전체 이름 표시
  function displayName(set){
    if(window.NIKKI_SERVER === 'jp'){
      return trim(set.name_jp) || trim(set.name_kr) || trim(set.name_cn) || trim(set.name_en) || trim(set.name_na) || trim(set.name) || "이름없음";
    }
    return trim(set.name_en) || trim(set.name_na) || trim(set.name_kr) || trim(set.name_cn) || trim(set.name_jp) || trim(set.name) || "이름없음";
  }

  function allNames(set){
    const na = trim(set.name_na);
    const cn = trim(set.name_cn);
    const en = trim(set.name_en);
    const jp = trim(set.name_jp);
    let kr = trim(set.name_kr);

    // fallback: if KR missing, show "(번역)" using CN -> EN -> NA
    if(!kr){
      const base = cn || en || na;
      if(base) kr = base + " (번역)";
    }
    const lines = [];
    if(na) lines.push("북미: " + na);
    if(cn) lines.push("중국: " + cn);
    if(en) lines.push("영어: " + en);
    if(jp) lines.push("일본: " + jp);
    if(kr) lines.push("한국: " + kr);
    return lines;
  }

  function matchesQuery(set, query){
    query = trim(query);
    if(!query) return true;

    const ql = query.toLowerCase();

    // sources 텍스트 합치기
    const srcText = Array.isArray(set.sources)
      ? set.sources.map(s => [s.label, s.type, s.desc, s.text, s.value].map(x=>trim(x)).join(" ")).join(" ")
      : "";

    // event 텍스트 합치기
    const ev = set.event || null;
    const evText = ev
      ? [ev.title, ev.desc, ev.guide].map(x=>trim(x)).join(" ")
      : "";

    const hay = [
      set.name_kr, set.name_cn, set.name_en, set.name_na, set.name_jp, set.name,
      set.id,
      srcText,
      evText
    ].map(x=>trim(x).toLowerCase()).join(" ");

    return hay.includes(ql);
  }

  function renderList(){
    const query = trim(q.value);
    const showMissingOnly = missingFilterCb && missingFilterCb.checked;
    let full = SETS.filter(s=>matchesQuery(s, query));

    // 미보유 필터: 보유 데이터가 있을 때만 활성화
    if(showMissingOnly && (OWNED_CODES.size > 0 || OWNED_NAMES.size > 0)){
      full = full.filter(s => {
        const allParts = getAllSetParts(s);
        return allParts.some(p => {
          const code = (p.code==null)?"":String(p.code);
          const name = trim(p.name) || "";
          if(OWNED_CODES.size>0) return !isOwnedByCode(code, p.part);
          return name && !isOwned(name);
        });
      });
    }

    // 정렬
    const sortVal = sortSel ? sortSel.value : 'default';
    // 기본 정렬: 최신 등록순 (배열 역순)
    if(sortVal !== 'default' && (OWNED_CODES.size > 0 || OWNED_NAMES.size > 0)){
      full = full.map(s => {
        const parts = Array.isArray(s.parts) ? s.parts : [];
        let ownedCount = 0;
        parts.forEach(p => {
          const code = (p.code == null) ? "" : String(p.code);
          const name = trim(p.name) || "";
          if(OWNED_CODES.size > 0){ if(isOwnedByCode(code, p.part)) ownedCount++; }
          else if(name && isOwned(name)){ ownedCount++; }
        });
        const pct = parts.length > 0 ? ownedCount / parts.length : 0;
        return { s, ownedCount, pct };
      }).sort((a, b) => {
        if(sortVal === 'owned_desc') return b.ownedCount - a.ownedCount;
        if(sortVal === 'owned_asc') return a.ownedCount - b.ownedCount;
        if(sortVal === 'pct_desc') return b.pct - a.pct;
        if(sortVal === 'pct_asc') return a.pct - b.pct;
        return 0;
      }).map(x => x.s);
    }

    const total = full.length;

    // empty + normalize page
    empty.style.display = (total===0) ? "block" : "none";

    const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
    if(currentPage > totalPages) currentPage = totalPages;
    if(currentPage < 1) currentPage = 1;

    const start = (currentPage - 1) * PER_PAGE;
    const pageList = full.slice(start, start + PER_PAGE);

    grid.innerHTML = "";

    const frag = document.createDocumentFragment();
    for(const s of pageList){
      const card = document.createElement("div");
      // 스포일러 판정: NA서버 → name_en 없으면 스포일러, JP서버 → name_jp 없으면 스포일러
      const _server = window.NIKKI_SERVER || 'na';
      const _lang = window.__SF_LANG || 'ko';
      const isSpoiler = (_server === 'na' && !trim(s.name_en) && !trim(s.name_na))
                     || (_server === 'jp' && !trim(s.name_jp));
      card.className = "card" + (isSpoiler ? " spoiler" : "");
      const img = trim(s.thumb) || (Array.isArray(s.images) && s.images[0]) || "";
      const sub = listSubName(s);

      // 기본 파츠 완성도
      const parts = Array.isArray(s.parts) ? s.parts : [];
      let ownedCount = 0;
      parts.forEach(p => {
        const code = (p.code == null) ? "" : String(p.code);
        const name = trim(p.name) || "";
        if(OWNED_CODES.size > 0){ if(isOwnedByCode(code, p.part)) ownedCount++; }
        else if(name && isOwned(name)){ ownedCount++; }
      });
      const partTotal = parts.length;
      const pct = partTotal > 0 ? Math.round(ownedCount / partTotal * 100) : 0;
      const barColor = pct === 100 ? '#22c55e' : pct >= 50 ? '#f59e0b' : '#f43f5e';

      // 변형(리폼/포즈) 완성도 칩
      const variants = Array.isArray(s.variants) ? s.variants : [];
      let variantChipsHtml = '';
      if(variants.length > 0 && (OWNED_CODES.size > 0 || OWNED_NAMES.size > 0)){
        variantChipsHtml = variants.map(v => {
          const vitems = Array.isArray(v.items) ? v.items : [];
          if(!vitems.length) return '';
          let vo=0;
          vitems.forEach(it=>{
            const c=(it.code==null)?"":String(it.code);
            const n=trim(it.name)||"";
            if(OWNED_CODES.size>0){if(isOwnedByCode(c,it.part)) vo++;}
            else if(n && isOwned(n)) vo++;
          });
          const vt=vitems.length;
          const vp=vt>0?Math.round(vo/vt*100):0;
          const vc=vp===100?'#22c55e':vp>=50?'#f59e0b':'#f43f5e';
          const _vlabelRaw=trim(v.label)||trim(v.type)||"변형";
          const _vlabelMap={'포즈':'Pose','리폼':'Reform','진화':'Evolve','변형':'Variant','pose':'Pose','reform':'Reform','evolve':'Evolve'};
          // "리폼 I" → "Reform I" 처럼 앞 단어만 번역하고 뒷부분 유지
          const vlabel=(function(){
            if(window.__SF_LANG!=='en') return _vlabelRaw;
            var parts=_vlabelRaw.split(/\s+/);
            var translated=_vlabelMap[parts[0]]||parts[0];
            return parts.length>1?translated+' '+parts.slice(1).join(' '):translated;
          })();
          return `<span class="variant-chip" style="background:${vc}22;color:${vc};border:1px solid ${vc}55">${escapeHtml(vlabel)} ${vo}/${vt} (${vp}%)</span>`;
        }).join('');
      }

      const completionHtml = partTotal > 0 ? `
        <div class="completion-bar-wrap">
          <div class="completion-text" style="color:${barColor}">${ownedCount}/${partTotal} ${window.__SF_LANG==='en'?'owned':'보유'} (${pct}%)</div>
          <div class="completion-bar-bg"><div class="completion-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
          ${variantChipsHtml ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">${variantChipsHtml}</div>` : ''}
        </div>` : '';

      card.innerHTML = `
        ${isSpoiler ? `<div class="spoiler-badge">🔒 ${_server === 'jp' ? ((_lang === 'en') ? 'Not on JP server' : 'JP 미출시') : ((_lang === 'en') ? 'Not on EN server' : 'EN 미출시')}</div>` : ''}
        ${img ? `<img class="thumb" loading="lazy" decoding="async" src="${img}" alt="">` : `<div class="thumb"></div>`}
        <div class="meta">
          <div class="name">${escapeHtml(listMainName(s))}</div>
          ${sub ? `<div class="sub">${escapeHtml(sub)}</div>` : ``}
          <div class="pillrow">
            ${Array.isArray(s.parts) ? `<span class="pill">${window.__SF_LANG==='en'?'Parts':'부위'} ${s.parts.length}</span>` : ``}
            ${Array.isArray(s.images) ? `<span class="pill">${window.__SF_LANG==='en'?'Photos':'사진'} ${s.images.length}</span>` : ``}
          </div>
          ${completionHtml}
        </div>
      `;
      if(isSpoiler){
        card.addEventListener("click", ()=>showSpoilerConfirm(s));
      } else {
        card.addEventListener("click", ()=>openSet(s));
      }
      frag.appendChild(card);
    }
    grid.appendChild(frag);

    // pager
    renderPager(totalPages, total);

    const end = Math.min(total, start + PER_PAGE);
    const range = (total===0) ? "" : ` · ${start+1}-${end}`;
    const pageInfo = (totalPages>1) ? ` · ${currentPage}/${totalPages}` : "";
    status.textContent = window.__SF_LANG==='en' ? `Sets ${total} / Total ${SETS.length}${pageInfo}${range}` : `세트 ${total} / 전체 ${SETS.length}${pageInfo}${range}`;

    schedulePostHeight(true);
  }

  function setPage(n){
    const next = Math.max(1, Math.min(n, Math.max(1, Math.ceil((SETS.filter(s=>matchesQuery(s, trim(q.value))).length) / PER_PAGE))));
    if(next === currentPage) return;
    currentPage = next;
    renderList();
    try{ window.scrollTo({top:0, behavior:"smooth"}); }catch(e){ try{ window.scrollTo(0,0);}catch(_e){} }
  }

  function renderPager(totalPages, totalItems){
    if(!pager) return;
    if(totalItems<=0 || totalPages<=1){
      pager.style.display = "none";
      pager.innerHTML = "";
      return;
    }
    pager.style.display = "flex";
    pager.innerHTML = "";

    const makeBtn = (label, page, disabled=false, active=false)=>{
      const b = document.createElement("button");
      b.type = "button";
      b.className = "pbtn" + (active ? " active" : "");
      b.textContent = label;
      if(disabled) b.disabled = true;
      if(!disabled){
        b.addEventListener("click", ()=>setPage(page));
      }
      return b;
    };

    pager.appendChild(makeBtn("«", 1, currentPage===1));
    pager.appendChild(makeBtn("‹", currentPage-1, currentPage===1));

    // pages with ellipsis
    const pages = new Set([1, totalPages, currentPage, currentPage-1, currentPage+1, currentPage-2, currentPage+2]);
    const sorted = [...pages].filter(p=>p>=1 && p<=totalPages).sort((a,b)=>a-b);

    let prev = 0;
    for(const p of sorted){
      if(prev && p - prev > 1){
        const dots = document.createElement("span");
        dots.className = "pdots";
        dots.textContent = "…";
        pager.appendChild(dots);
      }
      pager.appendChild(makeBtn(String(p), p, false, p===currentPage));
      prev = p;
    }

    pager.appendChild(makeBtn("›", currentPage+1, currentPage===totalPages));
    pager.appendChild(makeBtn("»", totalPages, currentPage===totalPages));
  }


  window.openSet = function openSet(set){
    if(!set) return;

    dlgMain.textContent = displayName(set);
    dlgNames.innerHTML = "";
    for(const line of allNames(set)){
      const div = document.createElement("div");
      div.textContent = line;
      dlgNames.appendChild(div);
    }

    // 완성도 요약
    const dlgCompletion = document.getElementById('dlgCompletion');
    if(dlgCompletion){
      const plist2 = Array.isArray(set.parts) ? set.parts : [];
      let owned2 = 0;
      plist2.forEach(p => {
        const r = resolvePartAndItem(p.part, (p.code==null)?"":(p.code));
        const n = trim(p.name) || trim(r.item && r.item.name) || "";
        const c = (p.code == null) ? "" : String(p.code);
        if(OWNED_CODES.size > 0){
          if(isOwnedByCode(c, p.part)) owned2++;
        } else if(n && isOwned(n)){
          owned2++;
        }
      });
      const tot2 = plist2.length;
      const pct2 = tot2 > 0 ? Math.round(owned2/tot2*100) : 0;
      const col2 = pct2===100 ? '#22c55e' : pct2>=50 ? '#f59e0b' : '#f43f5e';
      if(tot2 > 0){
        dlgCompletion.style.display = 'flex';
        dlgCompletion.style.cssText = 'display:flex;align-items:center;gap:8px;margin-top:6px';
        dlgCompletion.innerHTML = `
          <div style="flex:1;height:6px;border-radius:999px;background:#f0f0f0;overflow:hidden">
            <div style="height:100%;border-radius:999px;width:${pct2}%;background:${col2};transition:width .4s"></div>
          </div>

  function renderVariants(set){
    if(!variantsSection || !variants) return;

    variants.innerHTML = "";
    const vlist = Array.isArray(set && set.variants) ? set.variants : [];
    if(!vlist.length){
      variantsSection.style.display = "none";
      return;
    }
    variantsSection.style.display = "block";

    const frag = document.createDocumentFragment();

    for(const v of vlist){
      if(!v || typeof v !== "object") continue;
      const vtype = String(v.type||"").toLowerCase();

      const group = document.createElement("div");
      group.className = "vgroup";

      // 완성도 계산
      const vitems = Array.isArray(v.items) ? v.items : [];
      let vo=0;
      const hasOwned2 = OWNED_CODES.size>0 || OWNED_NAMES.size>0;
      if(hasOwned2){
        vitems.forEach(it=>{
          const c=(it.code==null)?"":String(it.code);
          const n=trim(it.name)||"";
          if(OWNED_CODES.size>0){if(isOwnedByCode(c,it.part)) vo++;}
          else if(n && isOwned(n)) vo++;
        });
      }
      const vt2=vitems.length;
      const vp2=vt2>0?Math.round(vo/vt2*100):0;
      const vc2=vp2===100?'#22c55e':vp2>=50?'#f59e0b':'#f43f5e';

      const headDiv = document.createElement("div");
      headDiv.className = "vgroup-head";
      headDiv.innerHTML = `
        <div class="vtitle" style="margin:0">${escapeHtml((function(){
            var _raw=trim(v.label)||trim(v.type)||"파생";

            var _map={'포즈':'Pose','리폼':'Reform','진화':'Evolve','파생':'Variant','pose':'Pose','reform':'Reform','evolve':'Evolve'};

          `;

          const wrap = document.createElement("div");

    } else if(name && name !== '-'){
      ownedFlag = isOwned(name);

    const div = document.createElement("div");
    div.className = "pitem" + (ownedFlag === true ? " owned-yes" : ownedFlag === false ? " owned-no" : "");

      <div class="pmeta">
        <div class="pname">${escapeHtml(name)}</div>
        <div class="ppart">${escapeHtml(((function(){if(window.__SF_LANG!=='en') return part||'-';var _tp=window.__SF_TP||(window.parent&&window.parent.translatePart)||null;var _r=_tp?_tp(part||''):null;if(_r&&_r!==(part||'')) return _r;var _m={'헤어':'Hair','원피스':'Dress','아우터':'Coat','상의':'Top','하의':'Bottom','양말':'Hosiery','양말장식':'Sock Deco','신발':'Shoes','뷰티':'Makeup','반딧불의 영혼':'Spirit of Sheen','장식':'Accessory','장식 - 머리 - 머리':'Hair ornament','장식 - 머리 - 베일':'Veil','장식 - 머리 - 헤어핀':'Hairpin','장식 - 머리 - 귀장식':'Ear ornament','장식 - 귀':'Earring','장식 - 목 - 목도리':'Scarf','장식 - 목 - 목걸이':'Necklace','장식 - 손 - 팔찌(우)':'R. Bracelet','장식 - 손 - 팔찌(좌)':'L. Bracelet','장식 - 손 - 장갑':'Glove','장식 - 소품 - 소품(우)':'R. Handheld','장식 - 소품 - 소품(좌)':'L. Handheld','장식 - 소품 - 양손':'Both hands','장식 - 허리':'Waist','장식 - 특수 - 얼굴':'Face','장식 - 특수 - 가슴':'Brooch','장식 - 특수 - 문신':'Tattoo','장식 - 특수 - 날개':'Wings','장식 - 특수 - 꼬리':'Tail','장식 - 특수 - 전경':'Foreground','장식 - 특수 - 배경':'Background','장식 - 특수 - 상단':'Head ornament','장식 - 특수 - 하단':'Ground','장식 - 특수 - 스킨':'Skin'};return _m[part||'']||(part||'-');})())||"-")}</div>
        <div class="code">code: ${escapeHtml(String(code||"-"))}${escapeHtml(color)}${escapeHtml(base)}${escapeHtml(chain)}</div>
      </div>
      ${ownedFlag !== null ? `<span class="owned-badge ${ownedFlag ? 'yes' : 'no'}">${ownedFlag ? (window.__SF_LANG==='en'?'✓ Owned':'✓ 보유') : (window.__SF_LANG==='en'?'✗ Missing':'✗ 미보유')}</span>` : ''}
    `;
    div.addEventListener("click", ()=>openItemDetail({part, code}));
    return div;
  }

  function openItemDetail(ref){
    const part = trim(ref && (ref.part || ref.category || ''));
    const code = ref && (ref.code ?? ref.itemCode ?? ref.id);
    if(!part || code==null || code==="") return;

    const url = `item_detail.html?code=${encodeURIComponent(String(code))}&part=${encodeURIComponent(String(part))}`;

    const dlg2 = document.getElementById('itemDetailDialog');
    const frame2 = document.getElementById('itemDetailFrame');
    if(dlg2 && frame2){
      frame2.src = url;
      if (typeof dlg2.showModal === 'function') dlg2.showModal();
      else dlg2.setAttribute('open','open');
      return;
    }

    // fallback
    window.open(url, "_blank");
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(m){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]);
    });
  }

  closeBtn.addEventListener("click", ()=>{ try{ dlg.close(); }catch(e){} });

  // ✅ 빈 화면(다이얼로그 바깥 영역) 클릭 시 닫기
  // dialog는 backdrop 자체에 이벤트가 안 잡히므로,
  // dialog 요소 자체를 클릭했을 때(target이 dialog일 때) 닫도록 처리
  if(dlg){
    dlg.addEventListener("click", (e)=>{
      if(e.target === dlg){
        try{ dlg.close(); }catch(err){}
      }
    });
    // ESC는 기본 cancel 이벤트로 들어오는데, 기본 동작 유지(닫힘) + 혹시 막혀있을 때 대비
    dlg.addEventListener("cancel", ()=>{ try{ dlg.close(); }catch(err){} });
  }

  if(dlg){
    dlg.addEventListener("close", ()=>{ /* noop */ });
    dlg.addEventListener("cancel", ()=>{ /* noop */ });
  }
  if(zoomDlg){
    zoomDlg.addEventListener("click", ()=>{ try{ zoomDlg.close(); }catch(e){} });
    zoomDlg.addEventListener("cancel", ()=>{ try{ zoomDlg.close(); }catch(e){} });
  }

  q.addEventListener("input", ()=>{ currentPage = 1; renderList(); });

  // 미보유 필터 토글
  if(sortSel){
    sortSel.addEventListener("change", ()=>{ currentPage=1; renderList(); });
  }

  if(missingFilterCb && missingFilterToggle){
    missingFilterCb.addEventListener("change", ()=>{
      missingFilterToggle.classList.toggle("active", missingFilterCb.checked);
      currentPage = 1;
      renderList();
    });
  }

  // receive data from iframes
  window.addEventListener("message", (ev)=>{
    const msg = ev && ev.data;
    if(!msg || typeof msg !== "object") return;

    if(msg.__splitData === true && msg.key === "sets" && Array.isArray(msg.data)){
      SETS = msg.data.filter(x=>x && typeof x === "object");
      status.textContent = SETS.length ? (window.__SF_LANG==='en' ? "Sets loaded: " + SETS.length : "세트 로드 완료: " + SETS.length + "개") : (window.__SF_LANG==='en'?"Set data is empty.":"세트 데이터가 비어있어.");
      renderList();
  schedulePostHeight(true);
      return;
    }

    if(msg.__splitData === true && msg.key === "items" && Array.isArray(msg.data)){
      ITEMS = msg.data.filter(x=>x && typeof x === "object");
      buildItemIndex();
      // keep status if sets already loaded
      renderList();
      return;
    }

    if(msg.type === 'SETS_OPEN_BY_ID' && msg.setId){
      const target = SETS.find(s => s.id === msg.setId);
      if(target) openSet(target);
      return;
    }

    if(msg.type === 'NIKKI_DARK_CHANGE'){
      document.body.classList.toggle('dark', !!msg.dark);
      return;
    }
    if(msg.type === 'NIKKI_LANG_CHANGE'){
      window.__SF_LANG = msg.lang || 'ko';
      if(typeof applySfLang === 'function') applySfLang(window.__SF_LANG);
      renderList();
      return;
    }
    if(msg.type === 'SETS_OWNED_UPDATE' && Array.isArray(msg.owned)){
      updateOwned(msg.owned);
      return;
    }
    if(msg.type === 'NIKKI_SERVER_CHANGE'){
      window.NIKKI_SERVER = msg.server;
      renderList();
      return;
    }
  });

  // initial render
  renderList();
})();

  function hookImages(){
    document.querySelectorAll("img").forEach(img=>{
      if(img.__ph_hooked) return;
      img.__ph_hooked = true;
      img.addEventListener("load", ()=>schedulePostHeight(true));
      img.addEventListener("error", ()=>schedulePostHeight(true));
    });
  }
  window.addEventListener("load", ()=>{ hookImages(); schedulePostHeight(true); });
  window.addEventListener("resize", ()=>schedulePostHeight(true));

  /* ── 세트정보 다국어 ── */
  window.__SF_LANG = (function(){ try{ return window.parent.UI_LANG||localStorage.getItem('nikki_ui_lang')||'ko'; }catch(e){ return 'ko'; } })();

  var SF_EN = {
    sortDefault:'Default order', sortOwnedDesc:'Most owned', sortOwnedAsc:'Least owned',
    sortPctDesc:'Highest completion', sortPctAsc:'Lowest completion',
    missingFilter:'✗ Sets with missing items only',
    h3Photo:'Set Photos', h3Parts:'Set Parts Info',
    partsHint:'Click a part to open its item detail page.',
    h3Variants:'Reform · Evolve · Pose', missingTitle:'Missing Items',
    searchPh:'Search set name (EN/KO/ZH)',
  };
  var SF_KO = {
    sortDefault:'기본 순서', sortOwnedDesc:'보유 많은 순', sortOwnedAsc:'보유 적은 순',
    sortPctDesc:'완성도 높은 순', sortPctAsc:'완성도 낮은 순',
    missingFilter:'✗ 미보유 있는 세트만',
    h3Photo:'세트사진', h3Parts:'세트 부위별 정보',
    partsHint:'부위를 클릭하면 해당 의상 상세페이지가 열려.',
    h3Variants:'리폼 · 진화 · 포즈', missingTitle:'미보유 아이템',
    searchPh:'세트 이름 검색 (한/중/영/북미)',
  };

  var _VLABEL_MAP = {'포즈':'Pose','리폼':'Reform','진화':'Evolve','변형':'Variant','pose':'Pose','reform':'Reform','evolve':'Evolve'};

  function applySfLang(lang){
    window.__SF_LANG = lang;
    // translatePart 캐시 + 내장 맵 fallback
    try{ window.__SF_TP = (window.parent&&window.parent.translatePart)||null; }catch(e){ window.__SF_TP=null; }
    if(!window.__SF_TP){
      var _fallbackMap={
        '헤어':'Hair','원피스':'Dress','아우터':'Coat','상의':'Top','하의':'Bottom',
        '양말':'Hosiery','양말장식':'Sock Deco','신발':'Shoes','뷰티':'Makeup',
        '반딧불의 영혼':'Spirit of Sheen','장식':'Accessory',
        '장식 - 머리 - 머리':'Hair ornament','장식 - 머리 - 베일':'Veil',
        '장식 - 머리 - 헤어핀':'Hairpin','장식 - 머리 - 귀장식':'Ear ornament',
        '장식 - 귀':'Earring','장식 - 목 - 목도리':'Scarf','장식 - 목 - 목걸이':'Necklace',
        '장식 - 손 - 팔찌(우)':'R. Bracelet','장식 - 손 - 팔찌(좌)':'L. Bracelet',
        '장식 - 손 - 장갑':'Glove','장식 - 소품 - 소품(우)':'R. Handheld',
        '장식 - 소품 - 소품(좌)':'L. Handheld','장식 - 소품 - 양손':'Both hands',
        '장식 - 허리':'Waist','장식 - 특수 - 얼굴':'Face','장식 - 특수 - 가슴':'Brooch',
        '장식 - 특수 - 문신':'Tattoo','장식 - 특수 - 날개':'Wings','장식 - 특수 - 꼬리':'Tail',
        '장식 - 특수 - 전경':'Foreground','장식 - 특수 - 배경':'Background',
        '장식 - 특수 - 상단':'Head ornament','장식 - 특수 - 하단':'Ground','장식 - 특수 - 스킨':'Skin',
      };
      window.__SF_TP = function(k){ return _fallbackMap[k]||k; };
    }
    var d = lang==='en' ? SF_EN : SF_KO;
    // 세트 목록 타이틀
    var lt = document.getElementById('sf_listTitle'); if(lt) lt.textContent = lang==='en'?'Set List':'세트 목록';
    // 획득경로 배지
    var ab = document.getElementById('sf_acqBadge'); if(ab) ab.textContent = lang==='en'?'📍 Set Sources':'📍 세트 획득경로';
    // 파생 의상 힌트
    var vh = document.getElementById('sf_variantsHint'); if(vh) vh.textContent = lang==='en'?'Click an item to open its detail page.':'파생 의상을 클릭하면 해당 아이템 상세페이지가 열려.';
    // missing 섹션 설명
    var md = document.getElementById('sf_missingDesc'); if(md) md.textContent = lang==='en'?'Items not yet registered as owned.':'아직 등록되지 않은 아이템 목록이야.';
    // 검색창
    var qEl = document.getElementById('q'); if(qEl) qEl.placeholder = d.searchPh;
    // 미보유 필터 텍스트
    var mf = document.getElementById('sf_missingFilter'); if(mf) mf.textContent = d.missingFilter;
    // 정렬 select
    var sortEl = document.querySelector('select');
    if(sortEl){
      Array.from(sortEl.options).forEach(function(opt){
        var map = {default:d.sortDefault, owned_desc:d.sortOwnedDesc, owned_asc:d.sortOwnedAsc, pct_desc:d.sortPctDesc, pct_asc:d.sortPctAsc};
        if(map[opt.value]) opt.textContent = map[opt.value];
      });
    }
    // 다이얼로그 내 고정 텍스트
    ['sf_h3Photo','sf_h3Parts','sf_partsHint','sf_h3Variants','sf_missingTitle'].forEach(function(id){
      var el = document.getElementById(id); if(el) el.textContent = d[{sf_h3Photo:'h3Photo',sf_h3Parts:'h3Parts',sf_partsHint:'partsHint',sf_h3Variants:'h3Variants',sf_missingTitle:'missingTitle'}[id]];
    });
    // variant 칩 (카드에 이미 렌더된 것) 번역
    document.querySelectorAll('.variant-chip').forEach(function(chip){
      var ko = chip.getAttribute('data-vlabel');
      if(!ko){
        var txt = chip.textContent.trim();
        var m = txt.match(/^(.+?)\s+\d+\//);
        ko = m ? m[1].trim() : txt;
        chip.setAttribute('data-vlabel', ko);
      }
      var nums = chip.textContent.replace(/^.+?(\s+\d+\/.*)$/, '$1');
      if(lang==='en'){
        var parts = ko.split(/\s+/);
        var translated = (_VLABEL_MAP[parts[0]]||parts[0]);
        if(parts.length>1) translated += ' ' + parts.slice(1).join(' ');
        chip.textContent = translated + nums;
      } else {
        chip.textContent = ko + nums;
      }
    });
    // 이미 렌더된 owned-badge 번역
    document.querySelectorAll('.owned-badge.yes').forEach(function(b){
      b.textContent = lang==='en' ? '✓ Owned' : '✓ 보유';
    });
    document.querySelectorAll('.owned-badge.no').forEach(function(b){
      b.textContent = lang==='en' ? '✗ Missing' : '✗ 미보유';
    });
    // 카드 재렌더 (variant 칩 포함)
    if(typeof renderList==='function') renderList();
  }

  // 초기 적용
  (function(){
    var lang = (function(){ try{ return window.parent.UI_LANG||localStorage.getItem('nikki_ui_lang')||'ko'; }catch(e){ return 'ko'; } })();
    window.__SF_LANG = lang;
    if(document.readyState==='loading'){
      document.addEventListener('DOMContentLoaded', function(){ applySfLang(lang); });
    } else {
      applySfLang(lang);
    }
  })();

</script>

<!-- ✅ Item detail tab (dialog) -->
<dialog id="itemDetailDialog" style="width:min(980px,92vw);height:min(86vh,900px);padding:0;border:0;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.25);">

<script>
  (function(){

<div class="spoiler-confirm-overlay" id="spoilerOverlay">
  <div class="spoiler-confirm-box">
    <div class="spoiler-confirm-icon">🔒</div>
    <div class="spoiler-confirm-title" id="spoilerConfirmTitle">미출시 세트입니다</div>
    <div class="spoiler-confirm-desc" id="spoilerConfirmDesc">아직 서버에 출시되지 않은 세트예요.<br>그래도 확인하시겠어요?</div>
    <div class="spoiler-confirm-btns">
      <button class="spoiler-btn-no" id="spoilerBtnNo">아니오</button>
      <button class="spoiler-btn-yes" id="spoilerBtnYes">예</button>
    </div>
  </div>
</div>
<script>
(function(){
  var _pendingSet = null;
  var overlay = document.getElementById('spoilerOverlay');
  var btnYes = document.getElementById('spoilerBtnYes');
  var btnNo = document.getElementById('spoilerBtnNo');
  var titleEl = document.getElementById('spoilerConfirmTitle');
  var descEl = document.getElementById('spoilerConfirmDesc');

  window.showSpoilerConfirm = function(s){
    _pendingSet = s;
    var lang = window.__SF_LANG || 'ko';
    var server = window.NIKKI_SERVER || 'na';
    if(lang === 'en'){
      titleEl.textContent = server === 'jp' ? 'Not released on JP server' : 'Not released on EN server';
      descEl.innerHTML = 'This set has not been released yet.<br>Do you still want to view it?';
      btnYes.textContent = 'Yes';
      btnNo.textContent = 'No';
    } else {
      titleEl.textContent = server === 'jp' ? 'JP 미출시 세트입니다' : 'EN 미출시 세트입니다';
      descEl.innerHTML = '아직 서버에 출시되지 않은 세트예요.<br>그래도 확인하시겠어요?';
      btnYes.textContent = '예';
      btnNo.textContent = '아니오';
    }
    overlay.classList.add('show');
  };

  btnYes.addEventListener('click', function(){
    overlay.classList.remove('show');
    if(_pendingSet && typeof openSet === 'function') openSet(_pendingSet);
    _pendingSet = null;
  });

  btnNo.addEventListener('click', function(){
    overlay.classList.remove('show');
    _pendingSet = null;
  });

  overlay.addEventListener('click', function(e){
    if(e.target === overlay){
      overlay.classList.remove('show');
      _pendingSet = null;
    }
  });
})();
</script>
