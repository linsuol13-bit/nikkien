<!doctype html>
<style id="custom-font">
@font-face {
  font-family: "AngyeongGothic";
  src: url("Ba안경고딕_김영화_cej8784_naver_com_.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
* { font-family: "AngyeongGothic", system-ui, AppleSDGothicNeo, sans-serif !important; }
.badge, .pill, .pill-small, .tag-pill, .tag-chip,
.chip, .gtab, .skill, .countpill { font-size: 14px !important; }
.sc-num, .chip .v, .pill-small .v { font-weight: 700 !important; }
.tl-title-id, .tl-title-sub, .tl-speaker, .tl-kr-trans { font-weight: 700 !important; }
.score, .badge { font-weight: 700 !important; }
.badge.tag, .tag-pill, .tag-chip { font-weight: 400 !important; }
</style>
<meta charset="utf-8">
<script>
(function(){
  function send(data){
    try{
      parent.postMessage({__splitData:true, key:'sets', data:data}, '*');
    }catch(e){}
  }
  window.addEventListener('DOMContentLoaded', function(){
    var f = document.createElement('iframe');
    f.src = 'sets_data.html';
    f.style.display = 'none';
    document.body.appendChild(f);
    f.onload = function(){
      try{
        var sets = (f.contentWindow && f.contentWindow.SETS) ? f.contentWindow.SETS : [];
        send(sets);
      }catch(e){
        send([]);
      }
    };
  });
})();
</script>
