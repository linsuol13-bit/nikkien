<style id="custom-font">

/* 등급 배지 스탯별 색 */
.grade-stat-심플 { background:#788ea1; color:#fff; border-color:#fff; }
.grade-stat-활발 { background:#ff6f4f; color:#fff; border-color:#fff; }
.grade-stat-큐티 { background:#ff6b71; color:#fff; border-color:#fff; }

/* ── 세트 섹션 ── */
.set-card {
  display: flex;
  flex-direction: row;

  gap: 14px;
  padding: 12px 14px;

}

.set-info { flex: 1; min-width: 0; }
.set-name {

}
.set-sub {
  font-size: 12px;
  color: var(--pk-muted);

}

}

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>아이템 상세</title>
<style>
:root {
  --pk-1:#e91e8c; --pk-2:#f06292; --pk-3:#f48fb1;
  --pk-4:#fce4ec; --pk-5:#fff5f8;
  --pk-border:#f8bbd0;
  --pk-grad:linear-gradient(135deg,#e91e8c,#f06292);
  --pk-muted:#a06080;
  --pk-shadow:0 4px 20px rgba(233,30,140,.10);
  --pk-text:#2d1a22;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  background: var(--pk-5);
  color: var(--pk-text);
  min-height: 100vh;
}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--pk-5);border-radius:999px}
::-webkit-scrollbar-thumb{background:var(--pk-3);border-radius:999px}
::-webkit-scrollbar-thumb:hover{background:var(--pk-2)}
*{scrollbar-width:thin;scrollbar-color:var(--pk-3) var(--pk-5)}

/* ── 다크모드 ── */
body.dark{
  --pk-5:#1a1018;--pk-text:#f0e4ec;--pk-border:#4a2d3a;
  --pk-4:#2a1a2a;--pk-muted:#c0849c;
  background:#1a1018;color:#f0e4ec
}
body.dark .navbar{background:rgba(39,32,42,.95) !important;border-color:#4a2d3a !important}
body.dark .navbar-btn{background:#27202a;border-color:#4a2d3a;color:#f48fb1}
body.dark #btnRegisterOwned{background:#27202a;border-color:#4a2d3a;color:#c0849c}
body.dark .lang-btn{background:#27202a;border-color:#4a2d3a;color:#f48fb1}
body.dark .lang-btn.active{background:var(--pk-grad);border-color:transparent;color:#fff}
body.dark .sidebar{background:#27202a;border-color:#4a2d3a}
body.dark .s-chip{background:#1a1018;border-color:#4a2d3a}
body.dark .main{background:#1a1018}
body.dark .box{background:#27202a;border-color:#4a2d3a}
body.dark .sec-wrap{background:#27202a;border-color:#4a2d3a}
body.dark .lang-divider{background:#4a2d3a}
body.dark .lang.lang-active{background:#2a1a2a}
body.dark .pill.ko{background:#2a1a2a;border-color:#4a2d3a;color:#f48fb1}
body.dark .pill.en{background:#0e2a3a;border-color:#1e5a7a;color:#7dd3f8}
body.dark .pill.zh{background:#2a1a0e;border-color:#78350f;color:#fcd34d}
body.dark .pill.ja{background:#1a1a2a;border-color:#4a3a7a;color:#c4b5fd}
body.dark .source-list li{background:#1a1018;border-color:#4a2d3a;color:#f48fb1}
body.dark .source-list li:hover{background:#2a1a2a}
body.dark .mat-or-label{background:#2a1a2a;border-color:#4a2d3a;color:#c0849c}
body.dark .set-card{background:#27202a;border-color:#4a2d3a}
body.dark .craft-ok{background:#14532d;border-color:#166534;color:#bbf7d0}
body.dark .craft-no{background:#3b1a1a;border-color:#7f1d1d;color:#fca5a5}
body.dark .craft-badge.craft-ok{background:#14532d;border-color:#166534;color:#bbf7d0}
body.dark .craft-badge.craft-no{background:#3b1a1a;border-color:#7f1d1d;color:#fca5a5}
body.dark ::-webkit-scrollbar-track{background:#1a1018}
body.dark ::-webkit-scrollbar-thumb{background:#4a2d3a}
/* 이미지 배경은 다크모드에서도 흰색 유지 */
body.dark .sidebar-thumb{background:#fff}
body.dark .imgcard{background:#fff}
body.dark .mimg{background:#fff}
body.dark .dyeitem img{background:#fff}

/* ── 최상단 네비바 ── */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,245,248,.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--pk-border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
}
.navbar-btn {
  width: 32px; height: 32px;
  border: 1.5px solid var(--pk-border);
  border-radius: 8px;
  background: #fff;
  color: var(--pk-muted);
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s, color .12s;
}
.navbar-btn:hover { background:var(--pk-4); border-color:var(--pk-2); color:var(--pk-1); }
.navbar-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--pk-text);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
#btnRegisterOwned {
  margin-left: auto;
  height: 32px;
  padding: 0 12px;
  border: 1.5px solid var(--pk-border);
  border-radius: 8px;
  background: #fff;
  color: var(--pk-muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
  transition: background .12s, border-color .12s, color .12s;
}
#btnRegisterOwned:hover { background:var(--pk-4); border-color:var(--pk-2); color:var(--pk-1); }

/* 언어 선택 */
.lang-switcher {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.lang-btn {
  height: 28px;
  padding: 0 10px;
  border: 1.5px solid var(--pk-border);
  border-radius: 6px;
  background: #fff;
  color: var(--pk-muted);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: background .12s, border-color .12s, color .12s;
}
.lang-btn:hover { background: var(--pk-4); border-color: var(--pk-2); color: var(--pk-1); }
.lang-btn.active { background: var(--pk-grad); border-color: transparent; color: #fff; }

/* ── 2단 레이아웃 ── */
.layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 53px);
}

/* ── 왼쪽 사이드바 ── */
.sidebar {
  border-right: 1px solid var(--pk-border);
  background: #fff;
  padding: 24px 18px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  position: sticky;
  top: 53px;
  height: calc(100vh - 53px);
  overflow-y: auto;
}

/* 큰 썸네일 */
.sidebar-thumb {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 16px;
  border: 1.5px solid var(--pk-border);
  background: var(--pk-5);
  object-fit: cover;
  display: block;
  cursor: zoom-in;
  transition: box-shadow .18s, transform .18s;
}
.sidebar-thumb:hover {
  box-shadow: 0 8px 28px rgba(233,30,140,.2);
  transform: scale(1.02);
}

/* 사이드바 아이템 정보 */
.sidebar-name {
  font-size: 17px;
  font-weight: 500;
  color: var(--pk-text);
  line-height: 1.3;
  word-break: break-word;
}
.sidebar-sub {
  font-size: 12px;
  color: var(--pk-muted);
  margin-top: 3px;
}

/* 사이드바 칩들 */
.sidebar-chips {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.s-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  border-radius: 10px;
  background: var(--pk-5);
  border: 1.5px solid var(--pk-border);
  font-size: 13px;
}
.s-chip-label {
  font-size: 11px;
  color: var(--pk-muted);
  white-space: nowrap;
  min-width: 28px;
}
.s-chip-val {
  font-weight: 500;
  color: var(--pk-text);
  word-break: break-all;
}

/* ── 오른쪽 메인 콘텐츠 ── */
.main {
  background: var(--pk-5);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ── 섹션 스타일 (기존 클래스 그대로 호환) ── */
.sec-title {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--pk-1);
  margin: 0 0 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sec-title::before {
  content: '';
  display: block;
  width: 3px; height: 14px;
  background: var(--pk-grad);
  border-radius: 999px;
}
.sec-title small {
  font-weight: 400;
  color: var(--pk-muted);
  font-size: 11px;
  text-transform: none;
  letter-spacing: 0;
}

.box {
  background: #fff;
  border: 1.5px solid var(--pk-border);
  border-radius: 14px;
  padding: 14px;
}
.box-plain { background:transparent; border:none; padding:0; }

/* 각 섹션을 하나의 카드로 */
.sec-wrap {
  background: #fff;
  border: 1.5px solid var(--pk-border);
  border-radius: 16px;
  padding: 24px 22px;
  animation: fadeUp .3s cubic-bezier(.22,1,.36,1) both;
}
.sec-wrap:nth-child(1){animation-delay:.04s}
.sec-wrap:nth-child(2){animation-delay:.07s}
.sec-wrap:nth-child(3){animation-delay:.10s}
.sec-wrap:nth-child(4){animation-delay:.13s}
.sec-wrap:nth-child(5){animation-delay:.16s}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── 다국어 ── */
.lang-list {
  display: flex;
  flex-direction: column;
}
.lang-divider {
  height: 1px;
  background: var(--pk-border);
  margin: 12px 0;
}
.lang { display:grid; grid-template-columns:52px 1fr; gap:6px 10px; align-items:start; transition: background .15s; border-radius: 8px; padding: 4px 6px; margin: -4px -6px; }
.lang.lang-active { background: var(--pk-4); }
.lang+.lang { margin-top:0; }
.pill {
  display:inline-flex; align-items:center; justify-content:center;
  height:22px; padding:0 9px; border-radius:6px;
  font-size:11px; font-weight:500; border:1.5px solid; width:max-content;
}
.pill.ko{background:var(--pk-5);border-color:var(--pk-border);color:var(--pk-1)}
.pill.zh{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.pill.en{background:#ecfeff;border-color:#a5f3fc;color:#0e7490}
.pill.ja{background:#eef2ff;border-color:#c7d2fe;color:#3730a3}
.text{white-space:pre-wrap;line-height:1.65;font-size:14px;color:var(--pk-text)}

/* ── 이미지 그리드 ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.imgcard{
  border:1.5px solid var(--pk-border);border-radius:12px;
  background:var(--pk-5);overflow:hidden;
  min-height:100px;display:flex;align-items:center;justify-content:center;
  transition:box-shadow .15s;
}
.imgcard:hover{box-shadow:0 6px 18px rgba(233,30,140,.12)}
.imgcard img{max-width:100%;height:200px;object-fit:contain;display:block;cursor:zoom-in;transition:transform .15s}
.imgcard:hover img{transform:scale(1.03)}

/* ── 스탯 ── */
.stats{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start;justify-content:space-evenly}
.stat-wrap {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.stat {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 8px 20px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 500;
  position: relative;
  /* 바깥 테두리 + 안쪽 흰선 */
  box-shadow: 0 0 0 2px #fff inset;
}
.stat-grade {
  font-size: 12px;
  font-weight: 700;
  color: var(--pk-text);
}
.grade{
  font-weight:700;
  font-size:18px;
  font-weight:800;
  flex:0 0 auto;
  background:none;
  border:none;
}
.grade.grade-SSS{color:#ffa916}
.grade.grade-SS{color:#ffa916}
.grade.grade-S{color:#ffa916}
.grade.grade-A{color:#da597f}
.grade.grade-B{color:#9b7fd4}
.grade.grade-C{color:#53a5d6}
.grade.grade-D{color:#a0a0a0}
.grade.grade-{color:#c0c0c0}

/* ── 스탯 카드 배경색 (게임 내 색상) ── */
/* 배경: 연한색, outline: 진한 테두리색, inset shadow: 흰선 */
.stat-심플 { background:#d1dee6; outline:2px solid #788ea1; color:#788ea1; }
.stat-활발 { background:#ffe683; outline:2px solid #ff6f4f; color:#b85000; }
.stat-큐티 { background:#ffe4e0; outline:2px solid #ff6b71; color:#ff6b71; }
.stat-청순 { background:#def3d6; outline:2px solid #53aa9c; color:#53aa9c; }
.stat-따뜻 { background:#ffdcb5; outline:2px solid #fd763c; color:#fd763c; }
.stat-성숙 { background:#ff7878; outline:2px solid #ff7878; color:#ffffff; }
.stat-섹시 { background:#aaa3ca; outline:2px solid #aaa3ca; color:#ffffff; }
.stat-시원 { background:#cfeefb; outline:2px solid #66a9c7; color:#66a9c7; }
.stat-화려 { background:#eeb362; outline:2px solid #eeb362; color:#ffffff; }
.stat-우아 { background:#ebe9ff; outline:2px solid #aa93c3; color:#aa93c3; }

/* ── 출처 ── */
.source-box{border:none;background:transparent;padding:0}
.source-list{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:7px}
.source-list li{padding:6px 12px;border-radius:999px;background:var(--pk-5);border:1.5px solid var(--pk-border);font-weight:500;color:var(--pk-1);font-size:13px;transition:background .12s,border-color .12s}
.source-list li:hover{background:var(--pk-4);border-color:var(--pk-2)}
.source-list li::before{content:none}

/* ── 재료/염색 ── */
.materials{display:flex;flex-wrap:wrap;gap:16px}
.mat{width:64px;text-align:center}
.mat .mimg{width:56px;height:56px;border-radius:12px;border:1.5px solid var(--pk-border);background:var(--pk-5);object-fit:cover;display:block;margin:0 auto}
.mimg-ok{border-color:#86efac !important;box-shadow:0 0 0 2px #bbf7d0}
.matname{font-size:11px;margin-top:4px;color:var(--pk-muted);text-align:center;line-height:1.3}
.qty{margin-top:3px;font-size:12px;color:var(--pk-1);font-weight:500}
.qty-ok{color:#16a34a !important}
.qty-partial{color:#d97706 !important}
.mat-have{font-size:11px;color:var(--pk-muted);margin-top:1px}
.mat-have.have-ok{color:#16a34a;font-weight:600}
.matbtn{all:unset;cursor:pointer;width:64px;text-align:center;display:block}
.matbtn:focus{outline:2px solid rgba(233,30,140,.35);outline-offset:2px;border-radius:12px}
.matbtn:hover .mimg,.mimg{transition:transform .12s,box-shadow .12s}
.matbtn:hover .mimg{transform:translateY(-3px);box-shadow:0 8px 18px rgba(233,30,140,.18)}

/* 제작 가능 배지 */
.craft-badge{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;padding:2px 9px;border-radius:999px;vertical-align:middle;margin-left:7px}
.craft-ok{background:#dcfce7;color:#15803d;border:1.5px solid #86efac}
.craft-no{background:#fff1f2;color:#be123c;border:1.5px solid #fecdd3}

/* 선택 재료 (OR) 구분선 */
.mat-or-wrap{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.mat-or-label{font-size:11px;font-weight:700;color:var(--pk-muted);background:var(--pk-4);border:1px solid var(--pk-border);border-radius:999px;padding:2px 8px;white-space:nowrap;align-self:center}
.mat-section-label{font-size:12px;color:var(--pk-muted);font-weight:500;margin-bottom:4px}

.dyegrid{display:flex;flex-wrap:wrap;gap:14px}
.dyeitem{width:72px;text-align:center}
.dyename{font-size:11px;margin-top:5px;color:var(--pk-muted);text-align:center;line-height:1.3;word-break:keep-all}
.dyeitem img{width:56px;height:56px;border-radius:12px;object-fit:cover;display:block;border:1.5px solid var(--pk-border);background:var(--pk-5)}
.imgbtn{all:unset;cursor:pointer;display:block}
.imgbtn:hover img{transform:translateY(-3px);box-shadow:0 8px 18px rgba(233,30,140,.18)}
.imgbtn img{transition:transform .12s,box-shadow .12s}

.muted{color:var(--pk-muted);font-size:14px}
.clickable{cursor:pointer}

/* ── 라이트박스 ── */
#imgLightbox{display:none;position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.82);align-items:center;justify-content:center;cursor:zoom-out;backdrop-filter:blur(3px)}
#imgLightbox.open{display:flex}
#imgLightbox img{max-width:90vw;max-height:90vh;border-radius:16px;object-fit:contain}

/* ── 모바일: 1단으로 전환 ── */
@media(max-width:700px){
  .layout{ grid-template-columns:1fr; }
  .sidebar{
    position:static;
    height:auto;
    flex-direction:row;
    flex-wrap:wrap;
    align-items:flex-start;
    border-right:none;
    border-bottom:1px solid var(--pk-border);
    padding:14px;
    gap:12px;
  }
  .sidebar-thumb{ width:80px; height:80px; aspect-ratio:unset; border-radius:12px; flex:0 0 auto; }
  .sidebar-info{ flex:1; min-width:0; }
  .sidebar-chips{ flex-direction:row; flex-wrap:wrap; }
  .s-chip{ padding:5px 8px; }
  .main{ padding:14px; }
  .grid2{ grid-template-columns:1fr; }
}
</style>

<nav class="navbar">

<script>
/* 구글 드라이브 썸네일 실패 시 uc?export=view 로 재시도 */
document.addEventListener('error', function(ev) {
  var img = ev.target;
  if (!(img && img.tagName === 'IMG')) return;
  if (img.dataset.fallbackTried) return;
  try {
    var u = new URL(img.src);
    if (u.hostname === 'drive.google.com') {
      var id = u.searchParams.get('id');
      if (id) {
        img.dataset.fallbackTried = '1';
        img.src = 'https://drive.google.com/uc?export=view&id=' + id;
      }
    }
  } catch(e) {}
}, true);
</script>
<script>
/* ── 언어 선택 ── */
window.__activeLang = (function(){
  try { return localStorage.getItem('nikki_detail_lang') || 'ko'; } catch(e){ return 'ko'; }
})();

function getLocalizedName(detail){
  if(!detail || !detail.names) return '';
  const lang = window.__activeLang;
  const n = detail.names;
  return n[lang] || n.ko || n.en || n.zh || n.ja || '';
}
window.getLocalizedName = getLocalizedName;

// ── 부위 이름 번역 맵 ──
const __PART_NAMES = {
  "헤어":    { en: "Hair",        zh: "发型" },
  "드레스":  { en: "Dress",       zh: "礼服" },
  "원피스":  { en: "One-piece",   zh: "连衣裙" },
  "상의":    { en: "Top",         zh: "上衣" },
  "하의":    { en: "Pants",       zh: "裤子" },
  "신발":    { en: "Shoes",       zh: "鞋子" },
  "양말":    { en: "Socks",       zh: "袜子" },
  "외투":    { en: "Coat",        zh: "外套" },
  "장갑":    { en: "Gloves",      zh: "手套" },
  "목걸이":  { en: "Necklace",    zh: "项链" },
  "귀걸이":  { en: "Earrings",    zh: "耳环" },
  "반지":    { en: "Ring",        zh: "戒指" },
  "팔찌":    { en: "Bracelet",    zh: "手镯" },
  "장식":    { en: "Accessory",   zh: "饰品" },
  "안경":    { en: "Glasses",     zh: "眼镜" },
  "모자":    { en: "Hat",         zh: "帽子" },
  "가방":    { en: "Bag",         zh: "包包" },
  "스타킹":  { en: "Stockings",   zh: "丝袜" },
  "속옷":    { en: "Lingerie",    zh: "内衣" },
};
function getLocalizedPart(koPart){
  if(!koPart) return koPart;
  const lang = window.__activeLang || "ko";
  if(lang === "ko") return koPart;
  // "장식 - 머리" 형태인 경우 앞부분만 번역
  const base = koPart.split(/\s*[-·]\s*/)[0].trim();
  const map = __PART_NAMES[base];
  if(!map) return koPart;
  const translated = map[lang] || koPart;
  // 뒤에 서브카테고리가 있으면 그대로 붙이기
  const rest = koPart.slice(base.length);
  return rest ? translated + rest : translated;
}
window.getLocalizedPart = getLocalizedPart;

document.addEventListener('DOMContentLoaded', function(){
  // 초기 버튼 상태 반영
  document.querySelectorAll('.lang-btn').forEach(function(btn){

  });

  // 버튼 클릭 시 언어 변경
  document.querySelectorAll('.lang-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      window.__activeLang = btn.dataset.lang;
      try { localStorage.setItem('nikki_detail_lang', btn.dataset.lang); } catch(e){}

      // 버튼 active 상태
      document.querySelectorAll('.lang-btn').forEach(function(b){
        b.classList.toggle('active', b.dataset.lang === window.__activeLang);
      });

      // UI_LANG 기반 버튼 라벨 재적용 (홈페이지 언어가 EN이면 라벨도 영어 유지)
      if(typeof window.__applyUILang === 'function') window.__applyUILang();

      // 타이틀 즉시 반영
      var titleEl = document.getElementById('title');
      var sidebarNameEl = document.getElementById('sidebarName');
      var subEl = document.getElementById('subtitle');
      var nm = getLocalizedName(window.__currentDetail);
      if(titleEl) titleEl.textContent = nm || (window.UI_LANG==='en' ? 'Item Detail' : '아이템 상세');
      if(sidebarNameEl) sidebarNameEl.textContent = nm || '—';
      // 부위 번역 갱신
      if(subEl && window.__currentDetail){
        var rawPart = (window.__currentDetail.part || '') || new URLSearchParams(location.search).get('part') || '';
        var rawCode = window.__currentDetail.code || new URLSearchParams(location.search).get('code') || '';
        subEl.textContent = getLocalizedPart(rawPart) + (window.UI_LANG==='en' ? ' · Code ' : ' · 코드 ') + rawCode;
      }

      // 섹션 전체 재렌더 (이름/설명/재료/염색 이름 모두 반영)
      if(window.__currentDetail && typeof window.__rerenderSections === 'function'){
        window.__rerenderSections(window.__currentDetail);
      } else {
        // 재렌더 없으면 lang-active 클래스만 갱신
        document.querySelectorAll('.lang').forEach(function(row){
          var pill = row.querySelector('.pill');
          if(!pill) return;
          var cls = pill.classList[1];
          row.classList.toggle('lang-active', cls === window.__activeLang);
        });
      }
    });
  });
});

<script>
// 라이트박스
(function(){

  });
  document.addEventListener('keydown', function(ev){
    if(ev.key==='Escape') document.getElementById('imgLightbox').classList.remove('open');
  });

// render 완료 후 각 섹션을 sec-wrap 카드로 감싸기
(function(){
  function wrapSections(){
    window.wrapSections = wrapSections;
    var content = document.getElementById('content');
    if(!content) return;

    // 이미 sec-wrap으로 감싸져 있으면 스킵 (언어 재렌더 시 중복 방지)
    if(content.querySelector('.sec-wrap')) return;
    // 직접 자식에 sec-title 없으면 스킵
    var hasTitleDirectChild = Array.from(content.childNodes).some(function(n){
      return n.nodeType === 1 && n.classList && n.classList.contains('sec-title');
    });
    if(!hasTitleDirectChild) return;

    var nodes = Array.from(content.childNodes);
    var groups = [];
    var cur = null;

    nodes.forEach(function(n){
      var el = n.nodeType === 1 ? n : null;
      var isTitle = el && el.classList && el.classList.contains('sec-title');
      if(isTitle){
        cur = [el];
        groups.push(cur);
      } else if(cur){
        cur.push(n);
      }
    });

    if(!groups.length) return;

    var frag = document.createDocumentFragment();
    groups.forEach(function(grp){
      var wrap = document.createElement('div');
      wrap.className = 'sec-wrap';
      grp.forEach(function(n){ wrap.appendChild(n); });
      frag.appendChild(wrap);
    });
    content.innerHTML = '';
    content.appendChild(frag);
    content.className = '';
    content.style.cssText = 'display:flex;flex-direction:column;gap:16px;';
  }

  // MutationObserver로 content 변경 감지
  var obs = new MutationObserver(function(){
    var content = document.getElementById('content');
    if(content && content.querySelector('.sec-title')){
      obs.disconnect();
      wrapSections();
    }
  });
  var contentEl = document.getElementById('content');
  if(contentEl) obs.observe(contentEl, {childList:true, subtree:false});
})();

// 타이틀을 사이드바 이름 칸에도 동기화
(function(){
  var origTitle = document.getElementById('title');
  var sidebarName = document.getElementById('sidebarName');
  if(!origTitle || !sidebarName) return;
  var mo = new MutationObserver(function(){
    sidebarName.textContent = origTitle.textContent;
  });
  mo.observe(origTitle, {childList:true, characterData:true, subtree:true});
})();

// 칩을 사이드바형 s-chip으로 변환
(function(){
  var chipsEl = document.getElementById('chips');
  if(!chipsEl) return;
  var mo = new MutationObserver(function(){
    // chip → s-chip 변환
    Array.from(chipsEl.querySelectorAll('.chip:not(.s-chip-done)')).forEach(function(c){
      c.classList.add('s-chip-done');
      c.className = 's-chip';
      // b 태그 → label, 나머지 → val
      var b = c.querySelector('b');
      if(b){
        var label = document.createElement('span');
        label.className = 's-chip-label';
        label.textContent = b.textContent;
        var val = document.createElement('span');
        val.className = 's-chip-val';
        // b 다음 텍스트 노드 수집
        var rest = '';
        c.childNodes.forEach(function(n){
          if(n !== b) rest += n.textContent || '';
        });
        val.textContent = rest.trim();
        c.innerHTML = '';
        c.appendChild(label);
        c.appendChild(val);
      }
    });
  });
  mo.observe(chipsEl, {childList:true, subtree:true});
})();
</script>
<script>

(function(){

  function closeDetailView(){
    try{
      const t = window.top;
      if (t && typeof t.closeDetail === "function") { t.closeDetail(); return; }
    }catch(e){}
    try{
      const p = window.parent;
      if (p && typeof p.closeDetail === "function") { p.closeDetail(); return; }
    }catch(e){}
    // fallback: hide self if embedded, else attempt window.close
    try{ window.close(); }catch(e){}
  }

  function bindHeaderButtons(){
    const back = document.getElementById("btnBack");
    const close = document.getElementById("btnClose");
    if (back) back.addEventListener("click", () => history.back());
    if (close) close.addEventListener("click", closeDetailView);
  }

  bindHeaderButtons();

  const qs = new URLSearchParams(location.search);
  const code = String(qs.get("code") || "");
  const part = String(qs.get("part") || "");

  const elTitle = document.getElementById("title");
  const elSub = document.getElementById("subtitle");
  const elChips = document.getElementById("chips");
  const elThumb = document.getElementById("thumb");
  const elContent = document.getElementById("content");

  function esc(s){ return String(s ?? "").replace(/[&<>"]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }

  function chip(html){ const d=document.createElement("div"); d.className="chip"; d.innerHTML=html; return d; }

  // --- Detail loader via postMessage (works even on file://) ---
  function loadDetail(){
    return new Promise((resolve) => {
      const frame = document.createElement("iframe");
      frame.style.display = "none";
      frame.src = "./item_details_frame.html";
      document.body.appendChild(frame);

      let done = false;
      const timeout = setTimeout(() => {
        if (done) return;
        done = true;
        cleanup();
        resolve({ok:false, error:"item_details_frame.html에 데이터가 없거나, 로드에 실패했어."});
      }, 1800);

      function cleanup(){
        clearTimeout(timeout);
        window.removeEventListener("message", onMsg);
        try{ frame.remove(); }catch(e){}
      }

      function request(){
        try{
          frame.contentWindow.postMessage({ type:"GET_ITEM_DETAIL", code, part }, "*");
        }catch(e){}
      }

      function onMsg(ev){
        if(ev.origin !== location.origin && ev.origin !== 'null') return;
        const d = ev.data || {};
        if (d.type === "ITEM_DETAIL" && String(d.code) === code){
          if (done) return;
          done = true;
          cleanup();
          resolve({ok:true, detail:d.detail});
        }
        if (d.type === "ITEM_DETAILS_LOADED"){
          request();
        }
      }

      window.addEventListener("message", onMsg);
      frame.addEventListener("load", () => request());
    });
  }

  function pickThumb(detail){
    const imgs = detail && detail.imgs ? (Array.isArray(detail.imgs) ? detail.imgs : [detail.imgs]) : [];
    return imgs[0] || "";
  }

  function __rerenderSections(detail){
    if(!detail) return;
    const elContent = document.getElementById("content");
    if(!elContent) return;
    const sections = [];
    buildSections(detail, sections);
    elContent.className = "";
    elContent.style.cssText = "display:flex;flex-direction:column;gap:16px;";
    elContent.innerHTML = sections.join("");
    // 언어 재렌더 시 sec-wrap이 없는 새 HTML이 들어오므로 바로 감싸기
    if(typeof window.wrapSections === "function") window.wrapSections();
    try{ __hydrateReformNames(); }catch(e){}
    // 칩의 부위 이름도 갱신
    const elChipsEl = document.getElementById("chips");
    if(elChipsEl){
      const partChip = elChipsEl.querySelector('.s-chip:has(.s-chip-label)');
      if(partChip){
        // s-chip으로 변환된 칩 전체를 다시 그리기
        elChipsEl.innerHTML = "";
        if(detail.heart) elChipsEl.appendChild(chip("<b>❤</b> " + esc(detail.heart)));
        if(detail.part || part) elChipsEl.appendChild(chip("<b>" + (window.UI_LANG==='en'?'Part':'부위') + "</b> " + esc(getLocalizedPart(detail.part || part))));
        elChipsEl.appendChild(chip("<b>" + (window.UI_LANG==='en'?'Code':'코드') + "</b> " + esc(detail.code ?? code)));
        const tags = Array.isArray(detail.tags) ? detail.tags.filter(Boolean) : [];
        for(const t of tags.slice(0, 12)) elChipsEl.appendChild(chip(esc(t)));
      }
    }
  }
  window.__rerenderSections = __rerenderSections;

  function render(detail){
    // 현재 선택 언어 반영
    window.__currentDetail = detail;
    const nm = getLocalizedName(detail);
    elTitle.textContent = nm || (window.UI_LANG==='en' ? "Item Detail" : "아이템 상세");
    elSub.textContent = getLocalizedPart(detail.part || part || "") + (window.UI_LANG==='en' ? " · Code " : " · 코드 ") + (detail.code ?? code);

    // thumb
    const th = pickThumb(detail);
    if (th){ elThumb.src = th; elThumb.style.visibility = "visible"; }
    else { elThumb.style.visibility = "hidden"; }

    // chips
    elChips.innerHTML = "";
    if (detail.heart) elChips.appendChild(chip("<b>❤</b> " + esc(detail.heart)));
    if (detail.part || part) elChips.appendChild(chip("<b>" + (window.UI_LANG==='en'?'Part':'부위') + "</b> " + esc(getLocalizedPart(detail.part || part))));
    elChips.appendChild(chip("<b>" + (window.UI_LANG==='en'?'Code':'코드') + "</b> " + esc(detail.code ?? code)));

    const tags = Array.isArray(detail.tags) ? detail.tags.filter(Boolean) : [];
    for (const t of tags.slice(0, 12)){
      elChips.appendChild(chip(esc(t)));
    }

    // content sections
    const sections = [];
    buildSections(detail, sections);

    elContent.className = "";
    elContent.style.cssText = "display:flex;flex-direction:column;gap:16px;";
    elContent.innerHTML = sections.join("");
    try{ __hydrateReformNames(); }catch(e){}
  }

  function buildSections(detail, sections){
    function esc(s){ return String(s ?? "").replace(/[&<>"]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }

    // UI 언어 번역 헬퍼
    const _ui = window.UI_LANG || 'ko';
    const _isEn = _ui === 'en';
    const _T = {
      nameSection:  _isEn ? 'Names' : '이름',
      nameSub:      _isEn ? '4 languages' : '4개 언어',
      descSection:  _isEn ? 'Description' : '아이템 설명',
      imgSection:   _isEn ? 'Images' : '이미지',
      specSection:  _isEn ? 'Stats' : '스펙',
      srcSection:   _isEn ? 'Sources' : '획득경로',
      craftSection: _isEn ? 'Materials' : '도안 재료',
      dyeSection:   _isEn ? 'Dye' : '염색',
      setSection:   _isEn ? 'Set' : '세트',
      langKo:       _isEn ? 'KO' : '한국',
      langEn:       _isEn ? 'EN' : '영어',
      langZh:       _isEn ? 'ZH' : '중국',
      langJa:       _isEn ? 'JA' : '일본',
      craftOk:      _isEn ? '✓ Craftable' : '✓ 제작 가능',
      craftNo:      _isEn ? 'Not enough' : '재료 부족',
      matReq:       _isEn ? 'Required' : '필수 재료',
      matChoice:    _isEn ? 'Choose one' : '선택 재료',
      matOr:        _isEn ? '1 of these' : '이 중 1개',
      noMat:        _isEn ? 'No material info.' : '재료 정보가 없어.',
      noDye:        _isEn ? 'No dye images.' : '염색 이미지가 없어.',
      noInfo:       _isEn ? 'No detail info.' : '표시할 상세 정보가 없어.',
      setView:      _isEn ? 'View full set →' : '세트 전체 보기 →',
    };

    // Names
    if (detail.names){
      const n = detail.names || {};
      const activeLang = window.__activeLang || "ko";
      const makeLangRow = (cls, label, val) => val
        ? `<div class="lang${activeLang===cls?' lang-active':''}"><span class="pill ${cls}">${label}</span><div class="text">${esc(val)}</div></div>`
        : "";
      const rows = [
        makeLangRow("ko",_T.langKo,n.ko),
        makeLangRow("en",_T.langEn,n.en),
        makeLangRow("zh",_T.langZh,n.zh),
        makeLangRow("ja",_T.langJa,n.ja),
      ].filter(Boolean).join('<div class="lang-divider"></div>');
      sections.push(`
        <div class="sec-title">${_T.nameSection} <small>${_T.nameSub}</small></div>
        <div class="lang-list">${rows}</div>
      `);
    }

    // Description
    if (detail.desc){
      const d = detail.desc || {};
      const activeLang = window.__activeLang || "ko";
      const makeLangRow = (cls, label, val) => val
        ? `<div class="lang${activeLang===cls?' lang-active':''}"><span class="pill ${cls}">${label}</span><div class="text">${esc(val)}</div></div>`
        : "";
      const rows = [
        makeLangRow("ko",_T.langKo,d.ko),
        makeLangRow("en",_T.langEn,d.en),
        makeLangRow("zh",_T.langZh,d.zh),
        makeLangRow("ja",_T.langJa,d.ja),
      ].filter(Boolean).join('<div class="lang-divider"></div>');
      sections.push(`
        <div class="sec-title">${_T.descSection}</div>
        <div class="lang-list">${rows}</div>
      `);
    }

    // Images
    const imgs = detail.imgs ? (Array.isArray(detail.imgs) ? detail.imgs : [detail.imgs]) : [];
    if (imgs.length){
      const pairs = imgs.slice(0, 6);
      const cards = pairs.map(src => `<div class="imgcard"><img src="${esc(src)}" alt="" loading="lazy" decoding="async"></div>`).join("");
      sections.push(`
        <div class="sec-title">${_T.imgSection}</div>
        <div class="grid2">${cards}</div>
      `);
    }

    // Stats
    const __STAT_NAMES = {
      "화려": { en: "Gorgeous", zh: "", ja: "" },
      "우아": { en: "Elegant",  zh: "", ja: "" },
      "성숙": { en: "Mature",   zh: "", ja: "" },
      "섹시": { en: "Sexy",     zh: "", ja: "" },
      "시원": { en: "Cool",     zh: "", ja: "" },
      "따뜻": { en: "Warm",     zh: "", ja: "" },
      "활발": { en: "Lively",   zh: "", ja: "" },
      "큐티": { en: "Cute",     zh: "", ja: "" },
      "심플": { en: "Simple",   zh: "", ja: "" },
      "청순": { en: "Pure",     zh: "", ja: "" },
    };
    function getStatLabel(koName){
      const lang = window.__activeLang || "ko";
      if(lang === "ko") return koName;
      const map = __STAT_NAMES[koName];
      if(!map) return koName;
      return map[lang] || koName;
    }

    const statCards = Array.isArray(detail.statCards) ? detail.statCards : [];
    if (statCards.length){
      const statsHtml = statCards.map(s=>{
        const name = s.name || "";
        const grade = esc(s.grade || "");
        const txt = s.text || "";
        const koLabel = name ? name : (txt ? txt.split("/")[0].trim() : "");
        const label = esc(getStatLabel(koLabel) || koLabel || "스탯");
        const g = grade || (txt.match(/\[([A-Z]{1,3})\]/)?.[1] || "");
        return `<div class="stat-wrap"><div class="stat stat-${esc(koLabel)}">${label}</div><div class="grade grade-${g||""}">${g||"?"}</div></div>`;
      }).join("");

      // Fallbacks (in case someone already mirrored ITEMS onto a parent)
      try{ if (window.ITEMS || window.items) return (window.ITEMS || window.items); }catch(e){}
      try{ if (window.parent && (window.parent.ITEMS || window.parent.items)) return (window.parent.ITEMS || window.parent.items); }catch(e){}
      try{ if (window.top && (window.top.ITEMS || window.top.items)) return (window.top.ITEMS || window.top.items); }catch(e){}

// --- Resolve names for reform materials (async-safe) ---
let __DETAILS_MAP = null;
let __DETAILS_LOADING = false;
let __DETAILS_WAITERS = [];

function __ensureDetailsMap(cb){
  try{
    if (__DETAILS_MAP){ cb && cb(__DETAILS_MAP); return; }
    if (cb) __DETAILS_WAITERS.push(cb);
    if (__DETAILS_LOADING) return;
    __DETAILS_LOADING = true;

    const frame = document.createElement("iframe");
    frame.style.display = "none";
    frame.src = "./item_details_frame.html";
    document.body.appendChild(frame);

    frame.addEventListener("load", ()=>{
      try{
        __DETAILS_MAP = frame.contentWindow && frame.contentWindow.ITEM_DETAILS ? frame.contentWindow.ITEM_DETAILS : null;
      }catch(e){ __DETAILS_MAP = null; }
      __DETAILS_LOADING = false;
      const ws = __DETAILS_WAITERS.slice(); __DETAILS_WAITERS = [];
      ws.forEach(fn=>{ try{ fn(__DETAILS_MAP); }catch(e){} });
    });
  }catch(e){
    __DETAILS_LOADING = false;
    cb && cb(null);
  }
}

function __getNameByCode(code){
  const c = Number(code);
  if (!Number.isFinite(c)) return "";
  // 1) ITEM_DETAILS
  try{
    if (__DETAILS_MAP){
      const d = __DETAILS_MAP[String(c)] || __DETAILS_MAP[c];
      if (d && d.names){
        return d.names.ko || d.names.zh || d.names.en || d.names.ja || "";
      }
    }
  }catch(e){}
  // 2) ITEMS list (fallback)
  try{
    const items = getParentItems();
    if (items && Array.isArray(items)){
      const it = items.find(x => Number(x.code ?? x.itemCode) === c);
      if (it) return it.name || (it.names && (it.names.ko||it.names.zh||it.names.en||it.names.ja)) || "";
    }
  }catch(e){}
  return "";
}

function __hydrateReformNames(){
  const nodes = document.querySelectorAll(".matname[data-mimg]");
  if (!nodes.length) return;

  __ensureDetailsMap(()=>{}); // start loading early

  nodes.forEach(node=>{
    if (node.textContent && node.textContent.trim()) return;

    const code = node.getAttribute("data-mcode");
    let name = code ? __getNameByCode(code) : "";

    if (name){
      node.textContent = name;
      return;
    }

    // Fallback: ask index relay (same path that makes click-navigation work)
    const img = node.getAttribute("data-mimg") || "";
    if (!img) return;

    requestTargetByImg(img).then(t=>{
        if (!t) return;
        if (t.name && !(node.textContent && node.textContent.trim())) { node.textContent = String(t.name); }
        if (!t.code) return;
      // attach code/part onto the button so click navigation uses it too
      try{
        const btn = node.closest("button");
        if (btn){
          btn.setAttribute("data-code", String(t.code));
          if (t.part) btn.setAttribute("data-part", String(t.part));
        }
        node.setAttribute("data-mcode", String(t.code));
      }catch(e){}
      // ensure details map then fill name
      __ensureDetailsMap(()=>{
        const nm = __getNameByCode(t.code);
        if (nm) node.textContent = nm;
      });
    });
  });
}

function requestTargetByImg(imgUrl){
    return new Promise((resolve) => {
      const reqId = "req_" + Math.random().toString(36).slice(2) + Date.now();
      let done = false;
      function cleanup(){
        window.removeEventListener('message', onMsg);
      }
      function onMsg(ev){
        if(ev.origin !== location.origin && ev.origin !== 'null') return;
        const m = ev.data || {};
        if (m.type === 'FIND_ITEM_BY_IMG_RESPONSE' && m.reqId === reqId){
          done = true;
          cleanup();
          resolve(m.target || null);
        }
      }
      window.addEventListener('message', onMsg);
      // send to top; index.html will relay to itemsFrame
      try{ window.top.postMessage({ type:'FIND_ITEM_BY_IMG_REQUEST', reqId:reqId, img: imgUrl || "" }, '*'); }catch(e){}
      setTimeout(()=>{ if(done) return; cleanup(); resolve(null); }, 1200);
    });
  }
function parsePageToTarget(page){
    // expects like "1_헤어-18.html" or "1_원피스-598.html"
    const m = String(page||"").match(/^[^_]+_(.+)-(\d+)\.html$/);
    if (!m) return null;
    return { part: m[1], code: m[2] };
  }

  function gotoDetail(target){
    if (!target || !target.code) return;
    const params = new URLSearchParams(location.search);
    params.set("code", String(target.code));
    if (target.part) params.set("part", String(target.part));
    location.search = "?" + params.toString();
  }

  function driveId(url){
    const s = String(url||"");
    let m = s.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
    if (m) return m[1];
    m = s.match(/\/file\/d\/([a-zA-Z0-9_-]{10,})/);
    if (m) return m[1];
    m = s.match(/thumbnail\?id=([a-zA-Z0-9_-]{10,})/);
    if (m) return m[1];
    return null;
  }

  function findByImg(img){
    const items = getParentItems();
    if (!items || !img) return null;

    const id = driveId(img);
    const norm = String(img).replace(/&sz=w\d+/g,"");

    for (const it of items){
      const cand = (it.thumb || it.img || it.image || "");
      if (!cand) continue;

      const cid = driveId(cand);
      if (id && cid && id === cid) return { code: it.code, part: it.part };

      const c = String(cand).replace(/&sz=w\d+/g,"");
      if (c === norm) return { code: it.code, part: it.part };
    }
    return null;
  }

  // Delegate clicks for materials/dye thumbnails
  elContent.addEventListener("click", (ev)=>{
    // 세트 카드 클릭
    const setCard = ev.target.closest(".set-card[data-setid]");
    if(setCard){
      const setId = setCard.getAttribute("data-setid");
      const setName = setCard.getAttribute("data-setname");
      const msg = setId
        ? { type: "CALENDAR_OPEN_SET_BY_ID", setId: setId }
        : { type: "CALENDAR_OPEN_SET", setName: setName };

      // 1) 즉시 전송 — 탭 전환 + sets frame 로드 유발
      function sendMsg(){
        try{ if(window.top && window.top !== window) window.top.postMessage(msg, "*"); }catch(e){}
        try{ if(window.parent && window.parent !== window) window.parent.postMessage(msg, "*"); }catch(e){}
      }
      sendMsg();

      // 2) sets frame lazy load 완료 후 재전송 (500ms, 1200ms)
      // index.html이 __showPanel('sets') 후 setsViewFrame src 할당 → 로드에 시간 필요
      setTimeout(sendMsg, 500);
      setTimeout(sendMsg, 1200);
      return;
    }

    const btn = ev.target.closest("button[data-page], button[data-img], [data-code]");
    if (!btn) return;
    const page = btn.getAttribute("data-page");
    if (page){
      const t = parsePageToTarget(page);
      if (t) return gotoDetail(t);
    }
    const codeAttr = btn.getAttribute("data-code");
    if (codeAttr){
      return gotoDetail({ code: codeAttr, part: btn.getAttribute("data-part") || "" });
    }
    const imgAttr = btn.getAttribute("data-img");
    if (imgAttr){
      // Try local match (may fail on file:// due to origin restrictions)
      const tLocal = findByImg(imgAttr);
      if (tLocal) return gotoDetail(tLocal);

      // Ask index(itemsFrame) via postMessage relay
      requestTargetByImg(imgAttr).then(t=>{
        if (t) return gotoDetail(t);
        // not found: keep focus only
      });
      return;
    }
  });

// start
  if (!code){
    elSub.textContent = "코드를 받지 못했어.";
    elContent.textContent = "아이템 리스트에서 클릭하면 코드가 전달돼.";
    return;
  }

  loadDetail().then(res=>{
    if (!res.ok || !res.detail){
      elSub.textContent = "코드 " + (code||"?") + " 상세를 찾지 못함";
      elContent.className = "muted";
      elContent.textContent = res.error || "상세 데이터가 없어.";
      return;
    }
    render(res.detail);
  });
})();

(function(){
  // NIKKI_SERVER → __activeLang 매핑
  function serverToLang(server){
    if(server === 'jp') return 'ja';
    return 'en'; // na 기본
  }
  window.addEventListener('message', function(ev){
    if(ev.origin && ev.origin !== location.origin && ev.origin !== 'null') return;
    var msg = ev.data;
    if(!msg || typeof msg !== 'object') return;
    if(msg.type === 'NIKKI_DARK_CHANGE'){
      document.body.classList.toggle('dark', !!msg.dark);
      return;
    }
    if(msg.type === 'NIKKI_LANG_CHANGE'){
      window.UI_LANG = msg.lang || 'ko';
      try{ localStorage.setItem('nikki_ui_lang', window.UI_LANG); }catch(e){}
      if(typeof window.__applyUILang === 'function') window.__applyUILang();
      return;
    }
    if(msg.type !== 'NIKKI_SERVER_CHANGE') return;
    var lang = serverToLang(msg.server);
    if(lang === window.__activeLang) return;
    window.__activeLang = lang;
    try{ localStorage.setItem('nikki_detail_lang', lang); }catch(e){}
    // 버튼 active 상태 갱신
    document.querySelectorAll('.lang-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    // 타이틀 반영
    var titleEl = document.getElementById('title');
    var sidebarNameEl = document.getElementById('sidebarName');
    var subEl2 = document.getElementById('subtitle');
    var nm = getLocalizedName(window.__currentDetail);
    if(titleEl) titleEl.textContent = nm || '아이템 상세';
    if(sidebarNameEl) sidebarNameEl.textContent = nm || '—';
    // 부위 번역 갱신
    if(subEl2 && window.__currentDetail){
      var rawPart2 = (window.__currentDetail.part || '') || new URLSearchParams(location.search).get('part') || '';
      var rawCode2 = window.__currentDetail.code || new URLSearchParams(location.search).get('code') || '';
      subEl2.textContent = getLocalizedPart(rawPart2) + (window.UI_LANG==='en' ? ' · Code ' : ' · 코드 ') + rawCode2;

    // 섹션 전체 재렌더

    }
  });
})();

(function(){

  if (!btnReg) return;

  window.addEventListener('message', function(ev){
    if(ev.origin && ev.origin !== location.origin && ev.origin !== 'null') return;
    var msg = ev.data;
    if (!msg || typeof msg !== 'object') return;

    ){

    }

  function normalizePart(p){
    // "장식 - 머리 - 머리" -> "장식" 으로 정규화
    if (!p) return p;
    var t = p.trim();
    return t.startsWith('장식') ? '장식' : t;
  }
  function getEffectivePart(){
    var qs = new URLSearchParams(location.search);
    var p = String(qs.get('part') || '').trim();
    if (p) return normalizePart(p);
    var sub = document.getElementById('subtitle');
    if (sub){
      var txt = sub.textContent || '';
      var m = txt.match(/^([^·]+)/);
      if (m) return normalizePart(m[1].trim());
    }
    return '';
  }
  function getEffectiveCode(){
    var qs = new URLSearchParams(location.search);
    return String(qs.get('code') || '').trim();
  }

  function showToastLocal(msg, ok){
    // 자체 토스트 (index.html과 분리된 환경일 때)
    var el = document.getElementById('__regToast');
    if (!el){
      el = document.createElement('div');
      el.id = '__regToast';
      el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:10px;font-size:16px;font-weight:500;color:#fff;z-index:9999;pointer-events:none;transition:opacity .3s;white-space:nowrap;max-width:80vw;text-align:center';
      document.body.appendChild(el);
    }

    el.style.background = ok ? '#22c55e' : '#e91e8c';
    el.style.opacity = '1';
    clearTimeout(el.__t);
    el.__t = setTimeout(function(){ el.style.opacity='0'; }, 2000);
  }

  function tryRegisterViaParent(partVal, codeVal){
    // 방법 1: index.html이 직접 window.top/parent에 함수를 노출한 경우
    try{
      var top = window.top;
      if (top && typeof top.__registerOwnedByCodePart === 'function'){
        var ok = top.__registerOwnedByCodePart(partVal, codeVal);
        if (ok) return true;
      }
    }catch(e){}
    try{
      var par = window.parent;
      if (par && par !== window && typeof par.__registerOwnedByCodePart === 'function'){
        var ok2 = par.__registerOwnedByCodePart(partVal, codeVal);
        if (ok2) return true;
      }
    }catch(e){}
    // 방법 2: postMessage로 전달 (dialog 안에 iframe으로 열린 경우)
    try{
      if (window.top && window.top !== window){
        window.top.postMessage({ type:'OWNED_REGISTER_BY_CODE', part:partVal, code:String(codeVal) }, '*');
        return true; // 전달 성공 (결과는 비동기)
      }
    }catch(e){}
    try{
      if (window.parent && window.parent !== window){
        window.parent.postMessage({ type:'OWNED_REGISTER_BY_CODE', part:partVal, code:String(codeVal) }, '*');
        return true;
      }
    }catch(e){}
    return false;
  }

  function regLabel(registered){
    var en = window.UI_LANG === 'en';
    if(registered) return '<span style="font-size:18px">✓</span> ' + (en ? 'Owned' : '보유 등록됨');
    return '<span style="font-size:18px">👗</span> ' + (en ? 'Add to Owned' : '보유 등록');
  }

  function updateBtnState(registered){
    _registered = registered;
    if (registered){
      btnReg.style.background = 'linear-gradient(135deg,#22c55e,#4ade80)';
      btnReg.style.borderColor = '#86efac';
      btnReg.style.color = '#fff';
    } else {
      btnReg.style.background = '#fff';
      btnReg.style.borderColor = 'var(--pk-border)';
      btnReg.style.color = 'var(--pk-muted)';
    }
    btnReg.innerHTML = regLabel(registered);
  }

  btnReg.addEventListener('click', function(){
    var partVal = getEffectivePart();
    var codeVal = getEffectiveCode();

    if (!partVal || !codeVal){
      showToastLocal('부위 또는 코드 정보가 없어요', false);
      return;
    }

    var sent = tryRegisterViaParent(partVal, codeVal);
    var en = window.UI_LANG === 'en';
    if (sent){
      updateBtnState(true);
      showToastLocal(en
        ? '✓ Part: ' + partVal + ' · Code: ' + codeVal + ' registered!'
        : '✓ 부위: ' + partVal + ' · 코드: ' + codeVal + ' 등록 요청 완료!', true);
    } else {
      showToastLocal(en
        ? 'Please open this page within the main site to register ownership.'
        : '홈페이지 내에서 열어야 보유 등록이 적용돼요', false);
    }
  });

  // hover 스타일
  btnReg.addEventListener('mouseenter', function(){
    if (!_registered){
      btnReg.style.background = 'var(--pk-4)';
      btnReg.style.borderColor = 'var(--pk-2)';
      btnReg.style.color = 'var(--pk-1)';
    }
  });
  btnReg.addEventListener('mouseleave', function(){
    if (!_registered){
      btnReg.style.background = '#fff';
      btnReg.style.borderColor = 'var(--pk-border)';
      btnReg.style.color = 'var(--pk-muted)';
    }
  });

  // 페이지 로드 시 보유 여부 확인 (버튼 상태 복원)
  setTimeout(function(){
    var qs = new URLSearchParams(location.search);
    var partVal = normalizePart(String(qs.get('part') || '').trim());
    var codeVal = String(qs.get('code') || '').trim();
    if (!partVal || !codeVal) return;
    var send = function(w){ try{ if(w && w !== window) w.postMessage({ type:'OWNED_CHECK_BY_CODE', part:partVal, code:codeVal }, '*'); }catch(e){} };
    send(window.top);
    if (window.parent !== window.top) send(window.parent);
  }, 300);
})();

/* ===== UI 언어 일괄 적용 ===== */
window.__applyUILang = function(){
  var en = window.UI_LANG === 'en';
  // lang-btn 텍스트 갱신
  document.querySelectorAll('.lang-btn[data-label-ko]').forEach(function(btn){
    btn.textContent = en ? (btn.getAttribute('data-label-en') || btn.textContent) : btn.getAttribute('data-label-ko');
    // active 클래스 있으면 유지
  });
  // 보유 등록 버튼 갱신
  var btnReg = document.getElementById('btnRegisterOwned');
  if(btnReg){
    var registered = btnReg.style.background.indexOf('22c55e') !== -1;
    if(registered){
      btnReg.innerHTML = '<span style="font-size:15px">✓</span> ' + (en ? 'Owned' : '보유 등록됨');
    } else {
      btnReg.innerHTML = '<span style="font-size:15px">👗</span> ' + (en ? 'Add to Owned' : '보유 등록');
    }
  }
};

// 초기 로드: 최상위 window.top.UI_LANG 폴링 후 적용
(function(){
  function getTopLang(){
    try{ if(window.top && window.top !== window) return window.top.UI_LANG || null; }catch(e){}
    try{ if(window.parent && window.parent !== window) return window.parent.UI_LANG || null; }catch(e){}
    return null;
  }
  function tryApply(){
    var lang = getTopLang();
    if(lang) window.UI_LANG = lang;
    if(typeof window.__applyUILang === 'function') window.__applyUILang();
  }
  // DOMContentLoaded + 여러 타이밍에 시도 (iframe 로드 순서 불확실)
  function schedule(){
    setTimeout(tryApply, 0);
    setTimeout(tryApply, 200);
    setTimeout(tryApply, 600);
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', schedule);
  } else {
    schedule();
  }
})();

</script>
