<!doctype html>
<style id="custom-font">
@font-face {
  font-family: "AngyeongGothic";
  src: url("Ba안경고딕_김영화_cej8784_naver_com_.ttf") format("truetype");
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
* { font-family: "AngyeongGothic", system-ui, AppleSDGothicNeo, sans-serif !important; }
.badge, .pill, .pill-small, .tag-pill, .tag-chip,
.chip, .gtab, .skill, .countpill { font-size: 14px !important; }
.sc-num, .chip .v, .pill-small .v { font-weight: 700 !important; }
.tl-title-id, .tl-title-sub, .tl-speaker, .tl-kr-trans { font-weight: 700 !important; }
.score, .badge { font-weight: 700 !important; }
.badge.tag, .tag-pill, .tag-chip { font-weight: 400 !important; }
</style>
<meta charset="utf-8">
<title>아이템 상세</title>
<style>
  :root{
    --pk-1:#e91e8c;--pk-2:#f06292;--pk-3:#f48fb1;
    --pk-4:#fce4ec;--pk-5:#fff5f8;
    --pk-border:#f8bbd0;
    --pk-grad:linear-gradient(135deg,#e91e8c,#f06292);
    --pk-muted:#a06080;
    --pk-shadow:0 6px 24px rgba(233,30,140,.10);
    --pk-text:#2d1a22;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:16px;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--pk-5);color:var(--pk-text)}
  ::-webkit-scrollbar{width:7px;height:7px}
  ::-webkit-scrollbar-track{background:var(--pk-5);border-radius:999px}
  ::-webkit-scrollbar-thumb{background:var(--pk-3);border-radius:999px}
  ::-webkit-scrollbar-thumb:hover{background:var(--pk-2)}
  *{scrollbar-width:thin;scrollbar-color:var(--pk-3) var(--pk-5)}
  .wrap{max-width:980px;margin:0 auto}
  .card{background:#fff;border:1.5px solid var(--pk-border);border-radius:20px;box-shadow:var(--pk-shadow);position:relative;overflow:hidden}
  .card::before{content:'';display:block;height:4px;background:var(--pk-grad)}
  .head{display:flex;gap:14px;align-items:flex-start;padding:16px}
  .thumb{width:86px;height:86px;border-radius:16px;border:2px solid var(--pk-border);background:var(--pk-5);object-fit:cover;flex:0 0 auto;box-shadow:0 4px 12px rgba(233,30,140,.12)}
  .hcol{flex:1 1 auto;min-width:240px}
  .title{font-size:26px;font-weight:500;margin:0 0 2px;color:var(--pk-text)}
  .sub{font-size:16px;color:var(--pk-muted);margin:0 0 10px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:var(--pk-5);border:1.5px solid var(--pk-border);font-size:14px;color:var(--pk-text)}
  .chip b{font-weight:500;color:var(--pk-1)}
  .section{padding:0 16px 16px}
  .sec-title{display:flex;align-items:center;gap:8px;font-weight:500;margin:14px 0 10px;color:var(--pk-1);font-size:17px}
  .sec-title::before{content:'';display:block;width:3px;height:16px;background:var(--pk-grad);border-radius:999px}
  .sec-title small{font-weight:500;color:var(--pk-muted);font-size:14px}
  .box{border:1.5px solid var(--pk-border);border-radius:14px;background:#fff;padding:12px}
  .box-plain{border:0;background:transparent;padding:0}
  .rowline{height:1px;background:var(--pk-border);margin:0 16px}
  .lang{display:grid;grid-template-columns:74px 1fr;gap:10px 12px;align-items:start}
  .lang+.lang{margin-top:10px}
  .pill{display:inline-flex;align-items:center;justify-content:center;height:24px;padding:0 10px;border-radius:999px;font-size:14px;border:1.5px solid var(--pk-border);background:#fff;color:var(--pk-text);width:max-content;font-weight:500}
  .pill.ko{background:var(--pk-5);border-color:var(--pk-border);color:var(--pk-1)}
  .pill.zh{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
  .pill.ja{background:#eef2ff;border-color:#c7d2fe;color:#3730a3}
  .pill.en{background:#ecfeff;border-color:#a5f3fc;color:#0e7490}
  .text{white-space:pre-wrap;line-height:1.5;font-size:16px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .imgcard{border:1.5px solid var(--pk-border);border-radius:14px;background:var(--pk-5);overflow:hidden;min-height:180px;display:flex;align-items:center;justify-content:center}
  .imgcard img{max-width:100%;height:auto;display:block}
  .dyegrid{display:flex;flex-wrap:wrap;gap:12px}
  .dyeitem{width:62px;text-align:center}
  .dyeitem img{width:56px;height:56px;border-radius:12px;object-fit:cover;display:block;border:1.5px solid var(--pk-border);background:var(--pk-5)}
  .muted{color:var(--pk-muted);font-size:16px}
  .stats{display:flex;flex-wrap:wrap;gap:10px}
  .stat{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:12px;border:1.5px solid var(--pk-border);background:#fff;font-size:16px}
  .grade{width:28px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:500;border:1.5px solid transparent;background:var(--pk-5);font-size:13px}
  .grade.grade-SSS{background:linear-gradient(135deg,#ffb3b3,#ff7c7c);color:#7f0000;border-color:#ffb3b3}
  .grade.grade-SS{background:linear-gradient(135deg,#fbb6ce,#f687b3);color:#831843;border-color:#fbb6ce}
  .grade.grade-S{background:linear-gradient(135deg,#fde68a,#fbbf24);color:#78350f;border-color:#fde68a}
  .grade.grade-A{background:linear-gradient(135deg,#a7f3d0,#6ee7b7);color:#064e3b;border-color:#a7f3d0}
  .grade.grade-B{background:linear-gradient(135deg,#bae6fd,#7dd3fc);color:#0c4a6e;border-color:#bae6fd}
  .grade.grade-C{background:linear-gradient(135deg,#ddd6fe,#c4b5fd);color:#3b0764;border-color:#ddd6fe}
  .grade.grade-D{background:linear-gradient(135deg,#e5e7eb,#d1d5db);color:#374151;border-color:#e5e7eb}
  .list{margin:0;padding-left:18px}
  .materials{display:flex;flex-wrap:wrap;gap:12px}
  .mat{width:62px;text-align:center}
  .mat .mimg{width:56px;height:56px;border-radius:12px;border:1.5px solid var(--pk-border);background:var(--pk-5);object-fit:cover}
  .matname{font-size:14px;margin-top:4px;color:var(--pk-muted);text-align:center;line-height:1.2}
  .qty{margin-top:6px;font-size:14px;color:var(--pk-muted)}
  .clickable{cursor:pointer}
  .matbtn{all:unset;cursor:pointer;width:62px;text-align:center}
  .matbtn:focus{outline:2px solid rgba(233,30,140,.35);outline-offset:2px;border-radius:12px}
  .matbtn:hover .mimg{transform:translateY(-2px);box-shadow:0 8px 18px rgba(233,30,140,.15)}
  .mimg{transition:transform .12s ease,box-shadow .12s ease}
  .imgbtn{all:unset;cursor:pointer;display:block}
  .imgbtn:hover img{transform:translateY(-2px);box-shadow:0 8px 18px rgba(233,30,140,.15)}
  .imgbtn img{transition:transform .12s ease,box-shadow .12s ease}
  .controls{position:absolute;top:14px;right:14px;display:flex;gap:6px;z-index:5}
  .ctrl-btn{width:32px;height:32px;border:1.5px solid var(--pk-border);border-radius:10px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--pk-muted);padding:0;transition:background .13s,border-color .13s}
  .ctrl-btn:hover{background:var(--pk-4);border-color:var(--pk-2);color:var(--pk-1)}
  .source-box{border:1.5px solid var(--pk-border);background:linear-gradient(135deg,var(--pk-5),#fff);padding:12px;border-radius:14px}
  .source-list{list-style:none;padding:0;margin:0;display:flex;flex-wrap:wrap;gap:8px}
  .source-list li{padding:6px 12px;border-radius:999px;background:#fff;border:1.5px solid var(--pk-border);font-weight:500;color:var(--pk-1);font-size:14px}
  .source-list li::before{content:none}
</style>

<div class="wrap">
  <div class="card">
  <div class="controls">
    <button class="ctrl-btn" id="btnBack" title="뒤로가기" aria-label="뒤로가기">←</button>
    <button id="btnRegisterOwned" title="보유 등록" style="height:32px;padding:0 12px;border:1.5px solid var(--pk-border);border-radius:10px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:14px;font-weight:500;color:var(--pk-muted);transition:background .13s,border-color .13s,color .13s">
      <span style="font-size:18px">👗</span> 보유 등록
    </button>
    <button class="ctrl-btn" id="btnClose" title="닫기" aria-label="닫기">×</button>
  </div>

    <div class="head">
      <img id="thumb" class="thumb" alt="" />
      <div class="hcol">
        <h1 class="title" id="title">아이템 상세</h1>
        <p class="sub" id="subtitle">불러오는 중…</p>
        <div class="chips" id="chips"></div>
      </div>
    </div>

    <div class="rowline"></div>

    <div class="section">
      <div id="content" class="muted" style="padding:10px 2px;">불러오는 중…</div>
    </div>
  </div>
</div>

<script>

(function(){

  function closeDetailView(){
    try{
      const t = window.top;
      if (t && typeof t.closeDetail === "function") { t.closeDetail(); return; }
    }catch(e){}
    try{
      const p = window.parent;
      if (p && typeof p.closeDetail === "function") { p.closeDetail(); return; }
    }catch(e){}
    // fallback: hide self if embedded, else attempt window.close
    try{ window.close(); }catch(e){}
  }

  function bindHeaderButtons(){
    const back = document.getElementById("btnBack");
    const close = document.getElementById("btnClose");
    if (back) back.addEventListener("click", () => history.back());
    if (close) close.addEventListener("click", closeDetailView);
  }

  bindHeaderButtons();

  const qs = new URLSearchParams(location.search);
  const code = String(qs.get("code") || "");
  const part = String(qs.get("part") || "");

  const elTitle = document.getElementById("title");
  const elSub = document.getElementById("subtitle");
  const elChips = document.getElementById("chips");
  const elThumb = document.getElementById("thumb");
  const elContent = document.getElementById("content");

  function esc(s){ return String(s ?? "").replace(/[&<>"]/g, c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c])); }

  function chip(html){ const d=document.createElement("div"); d.className="chip"; d.innerHTML=html; return d; }

  // --- Detail loader via postMessage (works even on file://) ---
  function loadDetail(){
    return new Promise((resolve) => {
      const frame = document.createElement("iframe");
      frame.style.display = "none";
      frame.src = "./item_details_frame.html";
      document.body.appendChild(frame);

      let done = false;
      const timeout = setTimeout(() => {
        if (done) return;
        done = true;
        cleanup();
        resolve({ok:false, error:"item_details_frame.html에 데이터가 없거나, 로드에 실패했어."});
      }, 1800);

      function cleanup(){
        clearTimeout(timeout);
        window.removeEventListener("message", onMsg);
        try{ frame.remove(); }catch(e){}
      }

      function request(){
        try{
          frame.contentWindow.postMessage({ type:"GET_ITEM_DETAIL", code, part }, "*");
        }catch(e){}
      }

      function onMsg(ev){
        if(ev.origin !== location.origin && ev.origin !== 'null') return;
        const d = ev.data || {};
        if (d.type === "ITEM_DETAIL" && String(d.code) === code){
          if (done) return;
          done = true;
          cleanup();
          resolve({ok:true, detail:d.detail});
        }
        if (d.type === "ITEM_DETAILS_LOADED"){
          request();
        }
      }

      window.addEventListener("message", onMsg);
      frame.addEventListener("load", () => request());
    });
  }

  function pickThumb(detail){
    const imgs = detail && detail.imgs ? (Array.isArray(detail.imgs) ? detail.imgs : [detail.imgs]) : [];
    return imgs[0] || "";
  }

  function render(detail){
    // header
    const nm = (detail.names && (detail.names.ko || detail.names.en || detail.names.zh || detail.names.ja)) || "";
    elTitle.textContent = nm || "아이템 상세";
    elSub.textContent = (detail.part || part || "") + " · 코드 " + (detail.code ?? code);

    // thumb
    const th = pickThumb(detail);
    if (th){ elThumb.src = th; elThumb.style.visibility = "visible"; }
    else { elThumb.style.visibility = "hidden"; }

    // chips
    elChips.innerHTML = "";
    if (detail.heart) elChips.appendChild(chip("<b>❤</b> " + esc(detail.heart)));
    if (detail.part || part) elChips.appendChild(chip("<b>부위</b> " + esc(detail.part || part)));
    elChips.appendChild(chip("<b>코드</b> " + esc(detail.code ?? code)));

    const tags = Array.isArray(detail.tags) ? detail.tags.filter(Boolean) : [];
    for (const t of tags.slice(0, 12)){
      elChips.appendChild(chip(esc(t)));
    }

    // content sections
    const sections = [];

    // Names
    if (detail.names){
      const n = detail.names || {};
      sections.push(`
        <div class="sec-title">이름 <small>4개 언어</small></div>
        <div class="box">
          <div class="lang"><span class="pill ko">한국</span><div class="text">${esc(n.ko||"")}</div></div>
          <div class="lang"><span class="pill en">영어</span><div class="text">${esc(n.en||"")}</div></div>
          <div class="lang"><span class="pill zh">중국</span><div class="text">${esc(n.zh||"")}</div></div>
          <div class="lang"><span class="pill ja">일본</span><div class="text">${esc(n.ja||"")}</div></div>
        </div>
      `);
    }

    // Description
    if (detail.desc){
      const d = detail.desc || {};
      sections.push(`
        <div class="sec-title">아이템 설명</div>
        <div class="box">
          ${d.ko ? `<div class="lang"><span class="pill ko">한국</span><div class="text">${esc(d.ko)}</div></div>` : ""}
          ${d.zh ? `<div class="lang"><span class="pill zh">중국</span><div class="text">${esc(d.zh)}</div></div>` : ""}
          ${d.ja ? `<div class="lang"><span class="pill ja">일본</span><div class="text">${esc(d.ja)}</div></div>` : ""}
          ${d.en ? `<div class="lang"><span class="pill en">영어</span><div class="text">${esc(d.en)}</div></div>` : ""}
        </div>
      `);
    }

    // Images
    const imgs = detail.imgs ? (Array.isArray(detail.imgs) ? detail.imgs : [detail.imgs]) : [];
    if (imgs.length){
      const pairs = imgs.slice(0, 6);
      const cards = pairs.map(src => `<div class="imgcard"><img src="${esc(src)}" alt="" loading="lazy" decoding="async"></div>`).join("");
      sections.push(`
        <div class="sec-title">이미지</div>
        <div class="grid2">${cards}</div>
      `);
    }

    // Stats
    const statCards = Array.isArray(detail.statCards) ? detail.statCards : [];
    if (statCards.length){
      const statsHtml = statCards.map(s=>{
        const name = esc(s.name || "");
        const grade = esc(s.grade || "");
        const txt = esc(s.text || "");
        const label = name ? name : (txt ? txt.split("/")[0].trim() : "");
        const g = grade || (txt.match(/\[([A-Z]{1,3})\]/)?.[1] || "");
        return `<div class="stat"><div class="grade grade-${g||""}">${g||"?"}</div><div>${esc(label||"스탯")}</div></div>`;
      }).join("");
      sections.push(`
        <div class="sec-title">스펙</div>
        <div class="stats">${statsHtml}</div>
      `);
    }

    // Sources
    const sources = detail.sources ? (Array.isArray(detail.sources) ? detail.sources : [detail.sources]) : [];
    if (sources.length){
      sections.push(`
        <div class="sec-title">획득경로</div>
        <div class="source-box">
          <ul class="source-list">${sources.map(s=>`<li>${esc(s)}</li>`).join("")}</ul>
        </div>
      `);
    }

    
// Reform / materials (도안 재료)
if (detail.reform && detail.reform.enabled){
  const mats = Array.isArray(detail.reform.materials) ? detail.reform.materials : [];
  const matsHtml = mats.length ? mats.map(m=>{
    const img = esc(m.img || "");
    const qty = esc(m.qty || "");
    const codeVal = esc(m.code ?? m.itemCode ?? "");
    // Always render placeholder; name will be hydrated after render (async-safe)
    return `<div class="mat">
      <button class="matbtn" type="button"
              data-img="${img}"
              ${codeVal ? ` data-code="${codeVal}"` : ``}
              ${m.part ? ` data-part="${esc(m.part)}"` : ``}>
        <img class="mimg" src="${img}" alt="" loading="lazy" decoding="async">
        <div class="matname" data-mimg="${img}" data-mcode="${codeVal}"></div>
        <div class="qty">× ${qty}</div>
      </button>
    </div>`;
  }).join("") : `<div class="muted">재료 정보가 없어.</div>`;
  sections.push(`
    <div class="sec-title">도안 재료</div>
    <div class="box box-plain">
      <div class="materials">${matsHtml}</div>
    </div>
  `);
}

    // Dye
    if (detail.dye && detail.dye.enabled){
      const dimgs = Array.isArray(detail.dye.images) ? detail.dye.images : [];
      const dpages = Array.isArray(detail.dye.pages) ? detail.dye.pages : [];
      const dHtml = dimgs.length ? dimgs.map((src, i)=>{
        const s = esc(src);
        const page = dpages[i] ? esc(dpages[i]) : "";
        const dataAttr = page ? ` data-page="${page}"` : ` data-img="${s}"`;
        return `<div class="dyeitem"><button class="imgbtn" type="button"${dataAttr}><img src="${s}" alt=""></button></div>`;
      }).join("") : `<div class="muted">염색 이미지가 없어.</div>`;
      sections.push(`
        <div class="sec-title">염색</div>
        <div class="dyegrid">${dHtml}</div>
      `);
    }

    // fallback
    if (!sections.length){
      sections.push(`<div class="muted">표시할 상세 정보가 없어.</div>`);
    }

    elContent.className = "";
    elContent.innerHTML = sections.join("");

    // Fill reform material names (async)
    try{ __hydrateReformNames(); }catch(e){}
  }

  
  function getParentItems(){
    try{
      // Walk up the frame tree to find the page that owns #itemsFrame
      let w = window;
      for (let i=0; i<8; i++){
        try{
          if (w && w.document){
            const fr = w.document.getElementById("itemsFrame");
            if (fr && fr.contentWindow && (fr.contentWindow.ITEMS || fr.contentWindow.items)) return (fr.contentWindow.ITEMS || fr.contentWindow.items);
          }
        }catch(e){}
        if (!w || w === w.parent) break;
        w = w.parent;
      }

      // Also try opener chains (if opened as a popup)
      let o = window.opener;
      for (let i=0; i<4 && o; i++){
        try{
          if (o.document){
            const fr = o.document.getElementById("itemsFrame");
            if (fr && fr.contentWindow && (fr.contentWindow.ITEMS || fr.contentWindow.items)) return (fr.contentWindow.ITEMS || fr.contentWindow.items);
          }
        }catch(e){}
        try{ if (o === o.parent) break; o = o.parent; }catch(e){ break; }
      }

      // Fallbacks (in case someone already mirrored ITEMS onto a parent)
      try{ if (window.ITEMS || window.items) return (window.ITEMS || window.items); }catch(e){}
      try{ if (window.parent && (window.parent.ITEMS || window.parent.items)) return (window.parent.ITEMS || window.parent.items); }catch(e){}
      try{ if (window.top && (window.top.ITEMS || window.top.items)) return (window.top.ITEMS || window.top.items); }catch(e){}
      try{ if (window.opener && (window.opener.ITEMS || window.opener.items)) return (window.opener.ITEMS || window.opener.items); }catch(e){}
      return null;
    }catch(e){
      return null;
    }
  }

  
  

// --- Resolve names for reform materials (async-safe) ---
let __DETAILS_MAP = null;
let __DETAILS_LOADING = false;
let __DETAILS_WAITERS = [];

function __ensureDetailsMap(cb){
  try{
    if (__DETAILS_MAP){ cb && cb(__DETAILS_MAP); return; }
    if (cb) __DETAILS_WAITERS.push(cb);
    if (__DETAILS_LOADING) return;
    __DETAILS_LOADING = true;

    const frame = document.createElement("iframe");
    frame.style.display = "none";
    frame.src = "./item_details_frame.html";
    document.body.appendChild(frame);

    frame.addEventListener("load", ()=>{
      try{
        __DETAILS_MAP = frame.contentWindow && frame.contentWindow.ITEM_DETAILS ? frame.contentWindow.ITEM_DETAILS : null;
      }catch(e){ __DETAILS_MAP = null; }
      __DETAILS_LOADING = false;
      const ws = __DETAILS_WAITERS.slice(); __DETAILS_WAITERS = [];
      ws.forEach(fn=>{ try{ fn(__DETAILS_MAP); }catch(e){} });
    });
  }catch(e){
    __DETAILS_LOADING = false;
    cb && cb(null);
  }
}

function __getNameByCode(code){
  const c = Number(code);
  if (!Number.isFinite(c)) return "";
  // 1) ITEM_DETAILS
  try{
    if (__DETAILS_MAP){
      const d = __DETAILS_MAP[String(c)] || __DETAILS_MAP[c];
      if (d && d.names){
        return d.names.ko || d.names.zh || d.names.en || d.names.ja || "";
      }
    }
  }catch(e){}
  // 2) ITEMS list (fallback)
  try{
    const items = getParentItems();
    if (items && Array.isArray(items)){
      const it = items.find(x => Number(x.code ?? x.itemCode) === c);
      if (it) return it.name || (it.names && (it.names.ko||it.names.zh||it.names.en||it.names.ja)) || "";
    }
  }catch(e){}
  return "";
}

function __hydrateReformNames(){
  const nodes = document.querySelectorAll(".matname[data-mimg]");
  if (!nodes.length) return;

  __ensureDetailsMap(()=>{}); // start loading early

  nodes.forEach(node=>{
    if (node.textContent && node.textContent.trim()) return;

    const code = node.getAttribute("data-mcode");
    let name = code ? __getNameByCode(code) : "";

    if (name){
      node.textContent = name;
      return;
    }

    // Fallback: ask index relay (same path that makes click-navigation work)
    const img = node.getAttribute("data-mimg") || "";
    if (!img) return;

    requestTargetByImg(img).then(t=>{
        if (!t) return;
        if (t.name && !(node.textContent && node.textContent.trim())) { node.textContent = String(t.name); }
        if (!t.code) return;
      // attach code/part onto the button so click navigation uses it too
      try{
        const btn = node.closest("button");
        if (btn){
          btn.setAttribute("data-code", String(t.code));
          if (t.part) btn.setAttribute("data-part", String(t.part));
        }
        node.setAttribute("data-mcode", String(t.code));
      }catch(e){}
      // ensure details map then fill name
      __ensureDetailsMap(()=>{
        const nm = __getNameByCode(t.code);
        if (nm) node.textContent = nm;
      });
    });
  });
}

function requestTargetByImg(imgUrl){
    return new Promise((resolve) => {
      const reqId = "req_" + Math.random().toString(36).slice(2) + Date.now();
      let done = false;
      function cleanup(){
        window.removeEventListener('message', onMsg);
      }
      function onMsg(ev){
        if(ev.origin !== location.origin && ev.origin !== 'null') return;
        const m = ev.data || {};
        if (m.type === 'FIND_ITEM_BY_IMG_RESPONSE' && m.reqId === reqId){
          done = true;
          cleanup();
          resolve(m.target || null);
        }
      }
      window.addEventListener('message', onMsg);
      // send to top; index.html will relay to itemsFrame
      try{ window.top.postMessage({ type:'FIND_ITEM_BY_IMG_REQUEST', reqId:reqId, img: imgUrl || "" }, '*'); }catch(e){}
      setTimeout(()=>{ if(done) return; cleanup(); resolve(null); }, 1200);
    });
  }
function parsePageToTarget(page){
    // expects like "1_헤어-18.html" or "1_원피스-598.html"
    const m = String(page||"").match(/^[^_]+_(.+)-(\d+)\.html$/);
    if (!m) return null;
    return { part: m[1], code: m[2] };
  }

  function gotoDetail(target){
    if (!target || !target.code) return;
    const params = new URLSearchParams(location.search);
    params.set("code", String(target.code));
    if (target.part) params.set("part", String(target.part));
    location.search = "?" + params.toString();
  }

  function driveId(url){
    const s = String(url||"");
    let m = s.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
    if (m) return m[1];
    m = s.match(/\/file\/d\/([a-zA-Z0-9_-]{10,})/);
    if (m) return m[1];
    m = s.match(/thumbnail\?id=([a-zA-Z0-9_-]{10,})/);
    if (m) return m[1];
    return null;
  }

  function findByImg(img){
    const items = getParentItems();
    if (!items || !img) return null;

    const id = driveId(img);
    const norm = String(img).replace(/&sz=w\d+/g,"");

    for (const it of items){
      const cand = (it.thumb || it.img || it.image || "");
      if (!cand) continue;

      const cid = driveId(cand);
      if (id && cid && id === cid) return { code: it.code, part: it.part };

      const c = String(cand).replace(/&sz=w\d+/g,"");
      if (c === norm) return { code: it.code, part: it.part };
    }
    return null;
  }

  // Delegate clicks for materials/dye thumbnails
  elContent.addEventListener("click", (ev)=>{
    const btn = ev.target.closest("button[data-page], button[data-img], [data-code]");
    if (!btn) return;
    const page = btn.getAttribute("data-page");
    if (page){
      const t = parsePageToTarget(page);
      if (t) return gotoDetail(t);
    }
    const codeAttr = btn.getAttribute("data-code");
    if (codeAttr){
      return gotoDetail({ code: codeAttr, part: btn.getAttribute("data-part") || "" });
    }
    const imgAttr = btn.getAttribute("data-img");
    if (imgAttr){
      // Try local match (may fail on file:// due to origin restrictions)
      const tLocal = findByImg(imgAttr);
      if (tLocal) return gotoDetail(tLocal);

      // Ask index(itemsFrame) via postMessage relay
      requestTargetByImg(imgAttr).then(t=>{
        if (t) return gotoDetail(t);
        // not found: keep focus only
      });
      return;
    }
  });

// start
  if (!code){
    elSub.textContent = "코드를 받지 못했어.";
    elContent.textContent = "아이템 리스트에서 클릭하면 코드가 전달돼.";
    return;
  }

  loadDetail().then(res=>{
    if (!res.ok || !res.detail){
      elSub.textContent = "코드 " + (code||"?") + " 상세를 찾지 못함";
      elContent.className = "muted";
      elContent.textContent = res.error || "상세 데이터가 없어.";
      return;
    }
    render(res.detail);
  });
})();

/* ===== 보유 등록 버튼 ===== */
(function(){
  var btnReg = document.getElementById('btnRegisterOwned');
  if (!btnReg) return;

  var _registered = false;

  // 보유 상태 응답 수신 (로드 시 복원 + 등록 ACK)
  window.addEventListener('message', function(ev){
    if(ev.origin && ev.origin !== location.origin && ev.origin !== 'null') return;
    var msg = ev.data;
    if (!msg || typeof msg !== 'object') return;
    var qs = new URLSearchParams(location.search);
    var myCode = String(qs.get('code') || '').trim();
    if (
      (msg.type === 'OWNED_REGISTER_ACK' || msg.type === 'OWNED_CHECK_RESULT') &&
      String(msg.code) === myCode
    ){
      updateBtnState(!!msg.owned);
    }
  });

  function normalizePart(p){
    // "장식 - 머리 - 머리" -> "장식" 으로 정규화
    if (!p) return p;
    var t = p.trim();
    return t.startsWith('장식') ? '장식' : t;
  }
  function getEffectivePart(){
    var qs = new URLSearchParams(location.search);
    var p = String(qs.get('part') || '').trim();
    if (p) return normalizePart(p);
    var sub = document.getElementById('subtitle');
    if (sub){
      var txt = sub.textContent || '';
      var m = txt.match(/^([^·]+)/);
      if (m) return normalizePart(m[1].trim());
    }
    return '';
  }
  function getEffectiveCode(){
    var qs = new URLSearchParams(location.search);
    return String(qs.get('code') || '').trim();
  }

  function showToastLocal(msg, ok){
    // 자체 토스트 (index.html과 분리된 환경일 때)
    var el = document.getElementById('__regToast');
    if (!el){
      el = document.createElement('div');
      el.id = '__regToast';
      el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:10px;font-size:16px;font-weight:500;color:#fff;z-index:9999;pointer-events:none;transition:opacity .3s;white-space:nowrap;max-width:80vw;text-align:center';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.background = ok ? '#22c55e' : '#e91e8c';
    el.style.opacity = '1';
    clearTimeout(el.__t);
    el.__t = setTimeout(function(){ el.style.opacity='0'; }, 2000);
  }

  function tryRegisterViaParent(partVal, codeVal){
    // 방법 1: index.html이 직접 window.top/parent에 함수를 노출한 경우
    try{
      var top = window.top;
      if (top && typeof top.__registerOwnedByCodePart === 'function'){
        var ok = top.__registerOwnedByCodePart(partVal, codeVal);
        if (ok) return true;
      }
    }catch(e){}
    try{
      var par = window.parent;
      if (par && par !== window && typeof par.__registerOwnedByCodePart === 'function'){
        var ok2 = par.__registerOwnedByCodePart(partVal, codeVal);
        if (ok2) return true;
      }
    }catch(e){}
    // 방법 2: postMessage로 전달 (dialog 안에 iframe으로 열린 경우)
    try{
      if (window.top && window.top !== window){
        window.top.postMessage({ type:'OWNED_REGISTER_BY_CODE', part:partVal, code:String(codeVal) }, '*');
        return true; // 전달 성공 (결과는 비동기)
      }
    }catch(e){}
    try{
      if (window.parent && window.parent !== window){
        window.parent.postMessage({ type:'OWNED_REGISTER_BY_CODE', part:partVal, code:String(codeVal) }, '*');
        return true;
      }
    }catch(e){}
    return false;
  }

  function updateBtnState(registered){
    _registered = registered;
    if (registered){
      btnReg.style.background = 'linear-gradient(135deg,#22c55e,#4ade80)';
      btnReg.style.borderColor = '#86efac';
      btnReg.style.color = '#fff';
      btnReg.innerHTML = '<span style="font-size:18px">✓</span> 보유 등록됨';
    } else {
      btnReg.style.background = '#fff';
      btnReg.style.borderColor = 'var(--pk-border)';
      btnReg.style.color = 'var(--pk-muted)';
      btnReg.innerHTML = '<span style="font-size:18px">👗</span> 보유 등록';
    }
  }

  btnReg.addEventListener('click', function(){
    var partVal = getEffectivePart();
    var codeVal = getEffectiveCode();

    if (!partVal || !codeVal){
      showToastLocal('부위 또는 코드 정보가 없어요', false);
      return;
    }

    var sent = tryRegisterViaParent(partVal, codeVal);
    if (sent){
      updateBtnState(true);
      showToastLocal('✓ 부위: ' + partVal + ' · 코드: ' + codeVal + ' 등록 요청 완료!', true);
    } else {
      // standalone(단독 페이지)으로 열렸을 때 안내
      showToastLocal('홈페이지 내에서 열어야 보유 등록이 적용돼요', false);
    }
  });

  // hover 스타일
  btnReg.addEventListener('mouseenter', function(){
    if (!_registered){
      btnReg.style.background = 'var(--pk-4)';
      btnReg.style.borderColor = 'var(--pk-2)';
      btnReg.style.color = 'var(--pk-1)';
    }
  });
  btnReg.addEventListener('mouseleave', function(){
    if (!_registered){
      btnReg.style.background = '#fff';
      btnReg.style.borderColor = 'var(--pk-border)';
      btnReg.style.color = 'var(--pk-muted)';
    }
  });

  // 페이지 로드 시 보유 여부 확인 (버튼 상태 복원)
  setTimeout(function(){
    var qs = new URLSearchParams(location.search);
    var partVal = normalizePart(String(qs.get('part') || '').trim());
    var codeVal = String(qs.get('code') || '').trim();
    if (!partVal || !codeVal) return;
    var send = function(w){ try{ if(w && w !== window) w.postMessage({ type:'OWNED_CHECK_BY_CODE', part:partVal, code:codeVal }, '*'); }catch(e){} };
    send(window.top);
    if (window.parent !== window.top) send(window.parent);
  }, 300);
})();

</script>
